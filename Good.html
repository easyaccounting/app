<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>淨息流 ． 生命軌跡</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #F9FAF9, #E6EBE9);
            --glass-bg: rgba(255, 255, 255, 0.65); --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #58504A; --text-light: #968E86;
            --accent-gold: #CBA37A; --accent-jade: #82968C; --accent-red: #D29498;
            --shadow-soft: 0 10px 40px rgba(160, 155, 150, 0.12);
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-gradient); color: var(--text-main); font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* --- 頂部導航與模組切換 --- */
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 800; padding: max(15px, env(safe-area-inset-top)) 20px 10px; display: flex; flex-direction: column; align-items: center; background: rgba(249,250,249,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.5); }
        .nav-content { width: 100%; max-width: 720px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-btn { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 50%; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); cursor: pointer; transition: all 0.2s; }
        .nav-btn:active { transform: scale(0.92); }
        .nav-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
        .page-title { font-size: 1.15rem; font-weight: 500; letter-spacing: 3px; color: var(--accent-gold); }

        .module-tabs { width: 100%; max-width: 720px; display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; scrollbar-width: none; -ms-overflow-style: none; }
        .module-tabs::-webkit-scrollbar { display: none; }
        .mod-tab { flex-shrink: 0; padding: 8px 18px; border-radius: 20px; font-size: 0.9rem; font-weight: 500; color: var(--text-light); border: 1px solid transparent; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
        .mod-tab svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
        .mod-tab.active { background: var(--glass-bg); color: var(--accent-jade); border-color: var(--glass-border); box-shadow: 0 2px 10px rgba(130,150,140,0.1); }

        .time-filter-wrap { width: 100%; max-width: 720px; margin: calc(130px + env(safe-area-inset-top)) auto 15px; padding: 0 20px; display: flex; justify-content: center; }
        .time-tabs { display: flex; background: rgba(255,255,255,0.4); border: 1px solid var(--glass-border); border-radius: 20px; padding: 4px; width: 100%; max-width: 400px; }
        .time-tab { flex: 1; text-align: center; padding: 6px 0; font-size: 0.85rem; color: var(--text-light); border-radius: 16px; cursor: pointer; transition: all 0.3s; }
        .time-tab.active { background: var(--glass-bg); color: var(--text-main); font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

        /* --- 主要內容區 (微觀卡片) --- */
        .main-container { width: 100%; max-width: 720px; margin: 0 auto; padding: 0 20px 100px; display: flex; flex-direction: column; gap: 15px; }
        .stat-card { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; box-shadow: var(--shadow-soft); cursor: pointer; transition: transform 0.2s; display: flex; flex-direction: column; }
        .stat-card:active { transform: scale(0.97); background: rgba(255,255,255,0.9); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-title { font-size: 1rem; font-weight: 500; letter-spacing: 1px; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .card-title svg { width: 18px; height: 18px; stroke: var(--accent-jade); fill: none; stroke-width: 2; }
        .card-body { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .card-data-text { flex: 1; }
        .data-main { font-size: 1.8rem; font-weight: 300; color: var(--text-main); line-height: 1.2; }
        .data-sub { font-size: 0.8rem; color: var(--text-light); }
        .mini-chart { width: 120px; height: 60px; display: flex; justify-content: center; align-items: center; position: relative; }

        /* --- 全螢幕展開層 (禪定深觀) --- */
        .expand-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: var(--bg-gradient); z-index: 2000; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column; overflow-y: auto; }
        .expand-overlay.open { transform: translateY(0); }
        .expand-header { padding: max(20px, env(safe-area-inset-top)) 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(249,250,249,0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--glass-border); }
        .expand-title { font-size: 1.15rem; font-weight: 500; letter-spacing: 2px; color: var(--accent-jade); }
        .expand-content { flex: 1; width: 100%; max-width: 720px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        /* 放大版圖表舞台 */
        .large-chart-stage { width: 100%; height: 280px; background: var(--glass-bg); border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); position: relative; padding: 20px 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* SVG 曲線樣式 */
        .large-chart-stage svg { width: 100%; height: 100%; overflow: visible; position: absolute; top: 0; left: 0; }
        .curve-sys { fill: none; stroke: var(--text-main); stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); transition: d 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .curve-dia { fill: none; stroke: var(--accent-jade); stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 4px 6px rgba(130, 150, 140, 0.2)); transition: d 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .curve-single { fill: none; stroke: var(--accent-jade); stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 6px 10px rgba(130, 150, 140, 0.25)); transition: d 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .chart-labels { position: absolute; bottom: 10px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; font-size: 0.7rem; color: var(--text-light); pointer-events: none; }
        .chart-legend { display: flex; gap: 15px; justify-content: center; margin-bottom: 10px; position: relative; z-index: 2; width: 100%; }
        .legend-item { font-size: 0.8rem; color: var(--text-light); display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        /* 歷史明細列表 */
        .history-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 40px; }
        .history-item { background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.6); border-radius: 16px; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .history-top { display: flex; justify-content: space-between; align-items: center; }
        .history-date { font-size: 0.85rem; color: var(--text-light); display: flex; align-items: center; gap: 8px; }
        .history-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 8px; background: rgba(255,255,255,0.8); border: 1px solid var(--glass-border); color: var(--text-main); }
        .history-val { font-size: 1.2rem; font-weight: 500; color: var(--text-main); }
        
        /* 備註與附加資訊 (如未服藥、HbA1c) */
        .history-memo { font-size: 0.8rem; color: var(--text-light); background: rgba(255,255,255,0.3); padding: 8px 12px; border-radius: 8px; border-left: 2px solid var(--accent-gold); display: inline-block; }
        .history-alert { font-size: 0.8rem; color: var(--accent-red); background: rgba(210, 148, 152, 0.1); padding: 8px 12px; border-radius: 8px; display: inline-block; font-weight: 500; }

        /* 大型圓滿光環 (吃藥專用) */
        .giant-donut-wrap { width: 200px; height: 200px; position: relative; display: flex; justify-content: center; align-items: center; margin: 0 auto; }
        .giant-donut-text { position: absolute; display: flex; flex-direction: column; align-items: center; }
        .giant-donut-text .num { font-size: 3rem; font-weight: 300; color: var(--accent-jade); line-height: 1; }
        .giant-donut-text .lbl { font-size: 0.85rem; color: var(--text-light); letter-spacing: 2px; margin-top: 5px; }

    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-content">
            <div class="nav-btn" onclick="history.back()"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></div>
            <div class="page-title">生命軌跡</div>
            <div style="width: 42px;"></div>
        </div>
        <div class="module-tabs">
            <div class="mod-tab" onclick="alert('切換至：財務收支')"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> 財務收支</div>
            <div class="mod-tab active"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg> 健康觀照</div>
            <div class="mod-tab" onclick="alert('切換至：形體變化')"><svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path></svg> 形體變化</div>
        </div>
    </div>

    <div class="time-filter-wrap">
        <div class="time-tabs">
            <div class="time-tab" onclick="switchTime(this)">近七日</div>
            <div class="time-tab active" onclick="switchTime(this)">本月</div>
            <div class="time-tab" onclick="switchTime(this)">近半年</div>
            <div class="time-tab" onclick="switchTime(this)">今年</div>
        </div>
    </div>

    <div class="main-container">
        <div class="stat-card" onclick="openDetail('服藥規律度', 'med')">
            <div class="card-header">
                <div class="card-title"><svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="8" rx="4"></rect><line x1="12" y1="8" x2="12" y2="16"></line></svg> 規律觀照</div>
                <div style="font-size: 0.8rem; color: var(--accent-jade);">狀態良好</div>
            </div>
            <div class="card-body">
                <div class="card-data-text"><div class="data-main">92<span style="font-size: 1rem;">%</span></div><div class="data-sub">本月達成率</div></div>
                <div class="mini-chart">
                    <svg viewBox="0 0 36 36" style="width: 60px; height: 60px; transform: rotate(-90deg);">
                        <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(130,150,140,0.2)" stroke-width="4"></circle>
                        <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--accent-jade)" stroke-width="4" stroke-dasharray="92, 100" stroke-linecap="round"></circle>
                    </svg>
                </div>
            </div>
        </div>

        <div class="stat-card" onclick="openDetail('血壓脈搏趨勢', 'bp')">
            <div class="card-header">
                <div class="card-title"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg> 血壓觀測</div>
                <div style="font-size: 0.8rem; color: var(--text-light);">平均值</div>
            </div>
            <div class="card-body">
                <div class="card-data-text"><div class="data-main">118<span style="font-size:1.2rem; color:var(--text-light)">/76</span></div><div class="data-sub">mmHg (平穩)</div></div>
                <div class="mini-chart">
                    <svg viewBox="0 0 100 40" style="width: 100%; height: 100%; stroke-linecap: round; fill: none; stroke-width: 2.5;">
                        <path d="M0,15 Q25,8 50,15 T100,10" stroke="var(--text-main)" style="opacity: 0.7;"></path>
                        <path d="M0,32 Q25,25 50,30 T100,28" stroke="var(--accent-jade)"></path>
                    </svg>
                </div>
            </div>
        </div>
        
        <div class="stat-card" onclick="openDetail('血糖起伏分析', 'bs')">
            <div class="card-header">
                <div class="card-title"><svg viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg> 血糖觀測</div>
                <div style="font-size: 0.8rem; color: var(--accent-gold);">單軌複合圖</div>
            </div>
            <div class="card-body">
                <div class="card-data-text"><div class="data-main">105</div><div class="data-sub">mg/dL (平均)</div></div>
                <div class="mini-chart">
                    <svg viewBox="0 0 100 40" style="width: 100%; height: 100%; fill: none;">
                        <line x1="0" y1="20" x2="100" y2="20" stroke="var(--accent-gold)" stroke-width="1" stroke-dasharray="2,2"></line>
                        <path d="M0,25 Q20,35 40,15 T80,22 T100,18" stroke="var(--accent-jade)" stroke-width="2.5" stroke-linecap="round"></path>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <div class="expand-overlay" id="detail-view">
        <div class="expand-header">
            <div class="nav-btn" onclick="closeDetail()"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></div>
            <div class="expand-title" id="detail-title">詳細軌跡</div>
            <div style="width: 42px;"></div>
        </div>
        
        <div class="expand-content">
            <div class="large-chart-stage" id="chart-stage">
                </div>
            
            <div style="font-size: 0.95rem; color: var(--text-main); font-weight: 500; margin-top: 5px; letter-spacing: 1px;">歷史明細</div>
            
            <div class="history-list" id="history-list-container">
                </div>
        </div>
    </div>

    <script>
        function switchTime(el) { document.querySelectorAll('.time-tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); }

        // ================= 模擬本機資料庫 (DB) =================
        const mockMedData = [
            { date: '10/25', time: '早晨', status: '已服', memo: '飯後隨即服用' },
            { date: '10/24', time: '睡前', status: '已服', memo: '' },
            { date: '10/24', time: '中午', status: '未服', memo: '外出忘記帶藥匣' }, // 漏吃
            { date: '10/23', time: '早晨', status: '已服', memo: '' }
        ];

        const mockBPData = [
            { date: '10/21', sys: 122, dia: 80, tag: '晚間' },
            { date: '10/22', sys: 126, dia: 85, tag: '早晨' }, 
            { date: '10/23', sys: 118, dia: 76, tag: '早晨' },
            { date: '10/24', sys: 112, dia: 70, tag: '晚間' },
            { date: '10/25', sys: 116, dia: 74, tag: '早晨' }
        ];

        // 血糖：混合了空腹與飯後，且包含了糖化血色素的選擇性輸入
        const mockBSData = [
            { date: '10/21', val: 95, tag: '空腹', hba1c: null, memo: '' },
            { date: '10/22', val: 145, tag: '飯後2H', hba1c: null, memo: '吃了兩塊蛋糕' }, // 飯後超標
            { date: '10/23', val: 92, tag: '空腹', hba1c: 6.6, memo: '今日回診抽血' }, // 包含糖化血色素警示
            { date: '10/24', val: 105, tag: '空腹', hba1c: null, memo: '' }, // 空腹微超標
            { date: '10/25', val: 130, tag: '隨機', hba1c: null, memo: '' }
        ];

        // ================= 引擎核心分配 =================
        function openDetail(title, type) {
            document.getElementById('detail-title').innerText = title;
            document.getElementById('detail-view').classList.add('open');
            document.body.style.overflow = 'hidden'; 
            
            const stage = document.getElementById('chart-stage');
            stage.innerHTML = ''; // 清空舞台
            
            setTimeout(() => {
                if (type === 'med') renderMedicationEngine(stage);
                if (type === 'bp') renderBPEngine(stage);
                if (type === 'bs') renderBSEngine(stage);
            }, 50);
        }

        function closeDetail() {
            document.getElementById('detail-view').classList.remove('open');
            document.body.style.overflow = 'auto';
        }

        // --- 1. 吃藥模組 (大型規律光環 + 漏吃文字高亮) ---
        function renderMedicationEngine(stage) {
            stage.innerHTML = `
                <div class="giant-donut-wrap">
                    <svg viewBox="0 0 36 36" style="width:100%; height:100%; transform: rotate(-90deg);">
                        <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(130,150,140,0.15)" stroke-width="2.5"></circle>
                        <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--accent-jade)" stroke-width="2.5" stroke-dasharray="92, 100" stroke-linecap="round" style="transition: stroke-dasharray 1.5s ease-out;"></circle>
                    </svg>
                    <div class="giant-donut-text">
                        <div class="num">92%</div><div class="lbl">本月圓滿度</div>
                    </div>
                </div>
            `;
            
            const list = document.getElementById('history-list-container');
            list.innerHTML = '';
            mockMedData.forEach(d => {
                let isMissed = d.status === '未服';
                let valColor = isMissed ? 'var(--accent-red)' : 'var(--accent-jade)';
                let memoHtml = d.memo ? `<div class="history-memo">${d.memo}</div>` : '';
                
                list.innerHTML += `
                    <div class="history-item" style="${isMissed ? 'border-color: rgba(210,148,152,0.4); background: rgba(255,255,255,0.7);' : ''}">
                        <div class="history-top">
                            <div class="history-date"><span>${d.date}</span><span class="history-tag">${d.time}</span></div>
                            <div class="history-val" style="color: ${valColor}; font-weight: ${isMissed ? 'bold' : 'normal'};">${d.status}</div>
                        </div>
                        ${memoHtml}
                    </div>
                `;
            });
        }

        // --- 2. 血壓模組 (雙軌貝茲) ---
        function renderBPEngine(stage) {
            stage.innerHTML = `
                <div class="chart-legend">
                    <div class="legend-item"><div class="legend-dot" style="background: var(--text-main);"></div>收縮壓</div>
                    <div class="legend-item"><div class="legend-dot" style="background: var(--accent-jade);"></div>舒張壓</div>
                </div>
                <svg preserveAspectRatio="none"><path class="curve-sys" id="path-sys" d=""></path><path class="curve-dia" id="path-dia" d=""></path></svg>
                <div class="chart-labels" id="bp-labels"></div>
            `;
            
            let pointsSys = [], pointsDia = [];
            const w = stage.clientWidth, h = stage.clientHeight, padX = 20, padY = 50, useW = w - padX*2, useH = h - padY*2;
            const range = 140 - 60; // 固定上下限較美觀
            
            mockBPData.forEach((d, i) => {
                let x = padX + (i / (mockBPData.length - 1)) * useW;
                pointsSys.push({ x: x, y: padY + useH - ((d.sys - 60) / range) * useH });
                pointsDia.push({ x: x, y: padY + useH - ((d.dia - 60) / range) * useH });
                if (i===0 || i===mockBPData.length-1 || i%2===0) {
                    document.getElementById('bp-labels').innerHTML += `<div style="position:absolute; left:${x}px; transform:translateX(-50%);">${d.date}</div>`;
                }
            });

            setTimeout(() => {
                document.getElementById('path-sys').setAttribute('d', generateBezierPath(pointsSys, 0.25));
                document.getElementById('path-dia').setAttribute('d', generateBezierPath(pointsDia, 0.25));
            }, 50);

            const list = document.getElementById('history-list-container');
            list.innerHTML = '';
            [...mockBPData].reverse().forEach(d => {
                let isWarn = d.sys > 120 || d.dia > 80;
                list.innerHTML += `
                    <div class="history-item">
                        <div class="history-top">
                            <div class="history-date"><span>${d.date}</span><span class="history-tag">${d.tag}</span></div>
                            <div class="history-val" style="color: ${isWarn ? 'var(--accent-red)' : 'var(--text-main)'};">${d.sys} / ${d.dia}</div>
                        </div>
                    </div>
                `;
            });
        }

        // --- 3. 血糖模組 (單軌貝茲 + 虛線參考線 + 糖化血色素警示) ---
        function renderBSEngine(stage) {
            stage.innerHTML = `
                <div class="chart-legend" style="justify-content: space-between; padding: 0 10px;">
                    <div class="legend-item" style="color:var(--text-main);"><svg width="14" height="2" style="stroke:var(--text-light); stroke-dasharray:2,2; stroke-width:2;"><line x1="0" y1="1" x2="14" y2="1"></line></svg> 參考線 100</div>
                    <div class="legend-item"><div class="legend-dot" style="background: var(--accent-jade);"></div>綜合血糖軌跡</div>
                </div>
                <svg preserveAspectRatio="none">
                    <line id="bs-baseline" x1="20" y1="0" x2="${stage.clientWidth-20}" y2="0" stroke="rgba(150,142,134,0.3)" stroke-width="1.5" stroke-dasharray="4,4"></line>
                    <path class="curve-single" id="path-bs" d=""></path>
                </svg>
                <div class="chart-labels" id="bs-labels"></div>
            `;

            let points = [];
            const w = stage.clientWidth, h = stage.clientHeight, padX = 20, padY = 50, useW = w - padX*2, useH = h - padY*2;
            const maxVal = 160, minVal = 70, range = maxVal - minVal;

            // 設定 100 的基準線 Y 座標
            let baseY = padY + useH - ((100 - minVal) / range) * useH;
            document.getElementById('bs-baseline').setAttribute('y1', baseY);
            document.getElementById('bs-baseline').setAttribute('y2', baseY);

            mockBSData.forEach((d, i) => {
                let x = padX + (i / (mockBSData.length - 1)) * useW;
                points.push({ x: x, y: padY + useH - ((d.val - minVal) / range) * useH });
                if (i===0 || i===mockBSData.length-1 || i%2===0) {
                    document.getElementById('bs-labels').innerHTML += `<div style="position:absolute; left:${x}px; transform:translateX(-50%);">${d.date}</div>`;
                }
            });

            setTimeout(() => { document.getElementById('path-bs').setAttribute('d', generateBezierPath(points, 0.25)); }, 50);

            const list = document.getElementById('history-list-container');
            list.innerHTML = '';
            [...mockBSData].reverse().forEach(d => {
                // 邏輯判斷：空腹 > 100，或飯後 > 140
                let limit = d.tag === '空腹' ? 100 : 140;
                let isWarn = d.val > limit;
                let memoHtml = d.memo ? `<div class="history-memo">${d.memo}</div>` : '';
                // 糖化血色素的獨立警示
                let hba1cHtml = d.hba1c ? `<div class="history-alert">糖化血色素: ${d.hba1c}% ${d.hba1c >= 6.5 ? '(警示)' : ''}</div>` : '';
                
                list.innerHTML += `
                    <div class="history-item">
                        <div class="history-top">
                            <div class="history-date"><span>${d.date}</span><span class="history-tag">${d.tag}</span></div>
                            <div class="history-val" style="color: ${isWarn ? 'var(--accent-red)' : 'var(--text-main)'};">${d.val}</div>
                        </div>
                        ${hba1cHtml}
                        ${memoHtml}
                    </div>
                `;
            });
        }

        function generateBezierPath(points, tension) {
            if(points.length === 0) return "";
            let pathData = `M ${points[0].x},${points[0].y}`;
            for (let i = 0; i < points.length - 1; i++) {
                let p0 = points[i === 0 ? 0 : i - 1]; let p1 = points[i]; let p2 = points[i + 1]; let p3 = points[i + 2 === points.length ? i + 1 : i + 2];
                let cp1x = p1.x + (p2.x - p0.x) * tension, cp1y = p1.y + (p2.y - p0.y) * tension;
                let cp2x = p2.x - (p3.x - p1.x) * tension, cp2y = p2.y - (p3.y - p1.y) * tension;
                pathData += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
            }
            return pathData;
        }
    </script>
</body>
