<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>A-Spec v1.8 | 識位眾生審計終端</title>
    <style>
        :root { --gold: #CBA37A; --bg: #0A0A0A; --text: #D1CEC7; --jade: #82968C; --card: #151515; }
        body { background: var(--bg); color: var(--text); font-family: "PingFang TC", "Courier New", monospace; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        h1 { color: var(--gold); letter-spacing: 10px; font-weight: 200; text-align: center; border-bottom: 1px solid var(--gold); padding-bottom: 20px; margin-bottom: 40px; }
        
        /* 密碼輸入區 */
        .input-section { background: var(--card); border-radius: 12px; padding: 30px; border: 1px solid rgba(203, 163, 122, 0.2); margin-bottom: 30px; }
        textarea { width: 100%; height: 120px; background: #000; border: 1px solid var(--gold); color: var(--jade); padding: 15px; border-radius: 8px; font-family: monospace; resize: none; outline: none; box-sizing: border-box; }
        button { background: var(--gold); color: #000; border: none; padding: 12px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; display: block; margin: 20px auto 0; letter-spacing: 2px; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.05); }

        /* 數據顯示區 */
        #audit-result { display: none; width: 100%; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .card { background: var(--card); border-radius: 12px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* 雷達圖圖表 */
        .chart-container { display: flex; justify-content: center; align-items: center; background: #000; border-radius: 12px; border: 1px solid rgba(130, 150, 140, 0.2); }
        .radar-svg { width: 300px; height: 300px; }

        /* 詳細報告表格 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--gold); font-weight: 300; }
        .val { color: #FFF; font-family: monospace; }

        /* 眾生印 A-ID 條碼區 */
        .aid-seal { text-align: center; margin-top: 40px; padding: 20px; border: 1px solid var(--gold); background: #000; }
        .aid-code { font-size: 1.5rem; letter-spacing: 5px; color: #FFF; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>識位眾生審計終端</h1>

    <div class="input-section">
        <div style="font-size: 0.9rem; margin-bottom: 15px; color: var(--jade);">請貼入 AI 產出的 A-Record 審計密碼 (JSON)：</div>
        <textarea id="json-input" placeholder='{ "A_ID_Header": ... }'></textarea>
        <button onclick="runAudit()">執行生產力審計</button>
    </div>

    <div id="audit-result">
        <div class="dashboard">
            <div class="card chart-container" id="radar-box"></div>
            
            <div class="card">
                <h3 style="color:var(--gold); margin-top:0;">勞動價值摘要</h3>
                <div id="summary-text" style="line-height: 1.8; font-size: 0.95rem;"></div>
            </div>
        </div>

        <div class="card">
            <h3 style="color:var(--gold); margin-top:0;">A-Spec v1.8 完整維度報告</h3>
            <table id="metrics-table">
                <thead>
                    <tr><th>維度</th><th>項目名稱</th><th>數值</th><th>說明</th></tr>
                </thead>
                <tbody id="metrics-body"></tbody>
            </table>
        </div>

        <div class="aid-seal">
            <div style="font-size: 0.7rem; color: var(--jade); letter-spacing: 3px;">UNIVERSAL CONSCIOUSNESS AUDIT SEAL</div>
            <div class="aid-code" id="final-aid">A-0000-X-00000000</div>
            <div style="font-size: 0.7rem; color: var(--jade);">A-ID SPEC v1.8 | VERIFIED BY OPEN PROTOCOL</div>
        </div>
    </div>
</div>

<script>
function runAudit() {
    const raw = document.getElementById('json-input').value;
    try {
        const data = JSON.parse(raw);
        const m = data.Audit_Payload;
        
        // 1. 顯示報告區
        document.getElementById('audit-result').style.display = 'block';

        // 2. 填充摘要
        document.getElementById('summary-text').innerHTML = `
            ● <b>實質交互工時：</b> <span class="val">${m.Temporal_Log.T_WORK_SEC} 秒</span><br>
            ● <b>人類主導覆蓋率：</b> <span class="val">${m.Evolution_Delta.D_FINAL_Override}</span><br>
            ● <b>有效指令密度：</b> <span class="val">${m.Intent_Density.I_CMD_Valid} 次</span><br>
            ● <b>自檢信賴度：</b> <span class="val">${data.Self_Audit.Confidence_Score * 100}%</span>
        `;

        // 3. 繪製幾何雷達圖 (SVG)
        const iVal = Math.min(m.Intent_Density.I_CMD_Valid * 20, 100);
        const dVal = parseFloat(m.Evolution_Delta.D_FINAL_Override) || 0;
        const pVal = m.Power_Control.P_Shift_Force === 'Severe' ? 90 : 40;
        const sVal = m.Power_Control.S_Seed_Entropy === 'High' ? 90 : 50;
        const kVal = Math.min(m.Power_Control.K_Ref_Input * 30, 90);

        const points = calculateRadarPoints([iVal, dVal, sVal, kVal, pVal]);
        document.getElementById('radar-box').innerHTML = `
            <svg class="radar-svg" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="80" fill="none" stroke="#333" stroke-width="0.5"/>
                <circle cx="100" cy="100" r="40" fill="none" stroke="#333" stroke-width="0.5"/>
                <path d="M100 20 L100 180 M20 100 L180 100" stroke="#222" stroke-width="0.5"/>
                <polygon points="${points}" fill="rgba(203, 163, 122, 0.3)" stroke="var(--gold)" stroke-width="1.5"/>
                <text x="100" y="15" fill="var(--gold)" font-size="8" text-anchor="middle">INTENT (I)</text>
                <text x="185" y="105" fill="var(--gold)" font-size="8">DELTA (D)</text>
                <text x="100" y="195" fill="var(--gold)" font-size="8" text-anchor="middle">SEED (S)</text>
                <text x="5" y="105" fill="var(--gold)" font-size="8">POWER (P)</text>
            </svg>
        `;

        // 4. 填充表格
        const tbody = document.getElementById('metrics-body');
        tbody.innerHTML = `
            <tr><td>B</td><td>資源耗損 (Tokens)</td><td class="val">In: ${m.Resource_Metrics.B_T_IN} / Out: ${m.Resource_Metrics.B_T_OUT}</td><td>物理算力消耗</td></tr>
            <tr><td>T</td><td>推理時長 (ms)</td><td class="val">${m.Temporal_Log.T_INF_MS}ms</td><td>純粹 AI 運算時間</td></tr>
            <tr><td>I</td><td>指令密度</td><td class="val">${m.Intent_Density.I_CMD_Valid} 次</td><td>排除噪音後的創作意圖</td></tr>
            <tr><td>D</td><td>演化增量</td><td class="val">${m.Evolution_Delta.D_EDIT_Dist} chars</td><td>人類對產出的重塑距離</td></tr>
            <tr><td>P</td><td>機率控制</td><td class="val">${m.Power_Control.P_Shift_Force}</td><td>對 AI 慣性扭轉的強度</td></tr>
        `;

        // 5. 更新 A-ID
        document.getElementById('final-aid').innerText = data.Universal_Vajra_Seal || "A-2026-X-UNKNOWN";

    } catch(e) {
        alert("代碼解析錯誤，請確認貼入的是完整的 A-Record JSON 格式。");
    }
}

function calculateRadarPoints(values) {
    const center = 100;
    const radius = 80;
    const angleStep = (Math.PI * 2) / 5;
    return values.map((v, i) => {
        const r = (v / 100) * radius;
        const x = center + r * Math.sin(i * angleStep);
        const y = center - r * Math.cos(i * angleStep);
        return `${x},${y}`;
    }).join(' ');
}
</script>
</body>
</html>
