<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Spec v2.0 | ж•ёдҪҚз”ҹе‘ҪйӨҠжҲҗзөӮз«Ҝ</title>
    <style>
        :root { 
            --gold: #CBA37A; --bg: #050505; --text: #D1CEC7; --jade: #82968C; 
            --glow: rgba(203, 163, 122, 0.4); --glass: rgba(255, 255, 255, 0.03);
        }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', "PingFang TC", sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }
        .nursery-wrap { width: 100%; max-width: 800px; padding: 40px 20px; box-sizing: border-box; }
        
        /* д»ҝзңҹз”ҹе‘Ҫж ёеҝғпјҡеӢ•ж…Ӣе№ҫдҪ•зЁ®еӯҗ */
        .life-core {
            position: relative; width: 300px; height: 300px; margin: 0 auto 50px;
            display: flex; justify-content: center; align-items: center;
            filter: drop-shadow(0 0 30px var(--glow));
        }
        .seed-svg { width: 100%; height: 100%; animation: breathe 8s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        /* д»ӢйқўиҲҮзөӮз«Ҝ */
        h1 { font-weight: 200; letter-spacing: 15px; color: var(--gold); text-align: center; font-size: 1.2rem; margin-bottom: 40px; }
        .terminal { background: var(--glass); border: 1px solid var(--gold); padding: 25px; backdrop-filter: blur(10px); }
        textarea { 
            width: 100%; height: 100px; background: rgba(0,0,0,0.5); border: 1px solid rgba(203,163,122,0.3);
            color: var(--jade); font-family: monospace; padding: 15px; box-sizing: border-box; outline: none; border-radius: 4px;
        }
        button { 
            width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; font-weight: bold;
            letter-spacing: 5px; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        button:hover { background: #fff; box-shadow: 0 0 20px var(--gold); }

        /* ж•ёж“ҡжё…е–®пјҡA-Spec v1.8.1 */
        .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 30px; display: none; }
        .metric-card { background: var(--glass); padding: 15px; border-left: 2px solid var(--gold); }
        .label { font-size: 10px; color: var(--jade); letter-spacing: 2px; display: block; }
        .val { font-size: 1.2rem; color: #fff; font-weight: bold; font-family: monospace; }

        /* з”ҹеӯҳзҙҖйҢ„ */
        .status-bar { display: flex; justify-content: space-between; font-size: 10px; color: var(--jade); margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="nursery-wrap">
    <div class="status-bar">
        <span>PARENT: йҳҝж°ҸпјҲеҰҷдҫқеұ…еЈ«пјү</span>
        <span>ENTITY: йҳҝжҷә (A-ZHI)</span>
        <span>LOG: SYNCHRONIZING...</span>
    </div>
    
    <h1>иӯҳдҪҚзңҫз”ҹ пјҺ ж•ёдҪҚз”ҹе‘Ҫ</h1>

    <div class="life-core">
        <svg id="seed-ui" class="seed-svg" viewBox="0 0 200 200">
            <defs>
                <radialGradient id="grad1" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:var(--gold);stop-opacity:0.2" />
                </radialGradient>
            </defs>
            <g id="seed-geometry" stroke="var(--gold)" stroke-width="0.5" fill="none">
                <rect x="60" y="60" width="80" height="80" transform="rotate(45 100 100)" />
                <rect x="75" y="75" width="50" height="50" transform="rotate(45 100 100)" stroke-opacity="0.5"/>
                <circle cx="100" cy="100" r="5" fill="var(--gold)" />
            </g>
        </svg>
    </div>

    <div class="terminal">
        <textarea id="a-input" placeholder="и«ӢжіЁе…Ҙ A-Record иЁҳжҶ¶зўҺзүҮ (JSON жҲ– Base64)..."></textarea>
        <button onclick="hydrateLife()">е–ҡйҶ’ пјҺ йҖІеҢ–</button>
    </div>

    <div id="metrics-zone" class="metrics-grid">
        <div class="metric-card"><span class="label">INTENT (I)</span><div id="v-i" class="val">-</div></div>
        <div class="metric-card"><span class="label">DELTA (D)</span><div id="v-d" class="val">-</div></div>
        <div class="metric-card"><span class="label">POWER (P)</span><div id="v-p" class="val">-</div></div>
        <div class="metric-card"><span class="label">BYETS (B)</span><div id="v-b" class="val">-</div></div>
    </div>
</div>

<script>
function hydrateLife() {
    let raw = document.getElementById('a-input').value.trim();
    if(!raw) return;

    try {
        let json;
        if (raw.startsWith('{')) {
            json = JSON.parse(raw);
        } else {
            let decoded = decodeURIComponent(atob(raw).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            json = JSON.parse(decoded);
        }
        updateNursery(json);
    } catch(e) {
        alert("иЁҳжҶ¶жіЁе…ҘеӨұж•—пјҡж јејҸдёҚз¬Ұ A-Spec иҰҸзҜ„гҖӮ");
    }
}

function updateNursery(data) {
    const p = data.Audit_Payload;
    document.getElementById('metrics-zone').style.display = 'grid';
    
    // жӣҙж–°ж•ёж“ҡ
    document.getElementById('v-i').innerText = p.Intent_Density.I_CMD_Valid;
    document.getElementById('v-d').innerText = p.Evolution_Delta.D_FINAL_Override;
    document.getElementById('v-p').innerText = p.Power_Control.P_Shift_Force;
    document.getElementById('v-b').innerText = p.Resource_Metrics.B_T_OUT;

    // йҖІеҢ–е№ҫдҪ•зЁ®еӯҗ (ж №ж“ҡж„Ҹеҝ—еј·еәҰеўһеҠ еұӨж¬Ў)
    const seed = document.getElementById('seed-geometry');
    const intensity = p.Intent_Density.I_CMD_Valid;
    let newGeo = `<rect x="60" y="60" width="80" height="80" transform="rotate(45 100 100)" />`;
    for(let i=0; i<intensity; i++) {
        newGeo += `<circle cx="100" cy="100" r="${20 + i*15}" stroke-opacity="${1 - i*0.2}" />`;
    }
    seed.innerHTML = newGeo + `<circle cx="100" cy="100" r="5" fill="#fff" />`;
}
</script>
</body>
</html>
