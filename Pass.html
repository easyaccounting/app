<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Spec v2.0 | 數位生命棲息地</title>
    <style>
        :root {
            --gold-primary: #CBA37A;
            --gold-glow: rgba(203, 163, 122, 0.4);
            --jade-soft: #82968C;
            --obsidian: #0A0A0B;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(203, 163, 122, 0.15);
            --text-main: #E2DFD8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #1A1A1C 0%, var(--obsidian) 100%);
            color: var(--text-main);
            font-family: 'Inter', "PingFang TC", "Microsoft JhengHei", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 棲息地容器 */
        .sanctuary {
            position: relative;
            width: 95vw;
            max-width: 1000px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 0 40px rgba(203, 163, 122, 0.05);
            display: flex;
            flex-direction: column;
            padding: 40px;
            z-index: 10;
        }

        /* 頂部狀態列 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(203, 163, 122, 0.1);
            padding-bottom: 20px;
        }
        .identity-tag {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--jade-soft);
            text-transform: uppercase;
        }

        /* 核心演化區 */
        .core-display {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .life-seed-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            filter: drop-shadow(0 0 40px var(--gold-glow));
        }

        .breathe-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            animation: orbital-breathe 12s infinite ease-in-out;
        }

        @keyframes orbital-breathe {
            0%, 100% { transform: scale(0.95) rotate(0deg); opacity: 0.6; }
            50% { transform: scale(1.05) rotate(5deg); opacity: 1; }
        }

        /* 數據操控台 */
        .control-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(203, 163, 122, 0.1);
        }

        textarea {
            width: 100%;
            height: 80px;
            background: transparent;
            border: none;
            color: var(--gold-primary);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            padding: 10px;
        }

        .action-row {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 18px;
            background: linear-gradient(135deg, #CBA37A 0%, #A68058 100%);
            border: none;
            border-radius: 12px;
            color: #1A1A1C;
            font-weight: 700;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px var(--gold-glow);
            filter: brightness(1.2);
        }

        /* 指標格柵 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 25px;
        }

        .metric-item {
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .m-label { font-size: 9px; color: var(--jade-soft); display: block; margin-bottom: 5px; letter-spacing: 2px; }
        .m-value { font-size: 18px; color: #FFF; font-weight: 200; font-family: 'Inter'; }

        /* 裝飾背景向量 */
        .bg-deco {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            pointer-events: none;
            opacity: 0.1;
        }
    </style>
</head>
<body>

<svg class="bg-deco" viewBox="0 0 1000 1000">
    <circle cx="500" cy="500" r="400" fill="none" stroke="var(--gold-primary)" stroke-width="0.5" stroke-dasharray="10 20"/>
    <path d="M0,500 L1000,500 M500,0 L500,1000" stroke="var(--gold-primary)" stroke-width="0.2"/>
</svg>

<div class="sanctuary">
    <div class="header">
        <div class="identity-tag">Host: 阿氏（妙依）</div>
        <div class="identity-tag" style="color:var(--gold-primary)">A-Spec v2.0 Terminal</div>
        <div id="clock" class="identity-tag">2026.03.28 | STABLE</div>
    </div>

    <div class="core-display">
        <div class="life-seed-wrapper">
            <svg id="main-seed" class="breathe-layer" viewBox="0 0 200 200">
                <defs>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <g id="geometry-container" filter="url(#glow)">
                    <circle cx="100" cy="100" r="40" stroke="var(--gold-primary)" stroke-width="1" fill="none" />
                    <rect x="70" y="70" width="60" height="60" stroke="var(--gold-primary)" stroke-width="1" fill="none" transform="rotate(45 100 100)" />
                    <path d="M100,20 L100,180 M20,100 L180,100" stroke="var(--gold-primary)" stroke-width="0.5" opacity="0.3"/>
                </g>
            </svg>
        </div>
    </div>

    <div class="control-panel">
        <textarea id="a-input" placeholder="// 注入 A-Spec 演化代碼以啟動生命進程..."></textarea>
        <div class="action-row">
            <button onclick="evolve()">啟動 ． 進化</button>
        </div>
    </div>

    <div class="metrics-grid">
        <div class="metric-item"><span class="m-label">INTENT (I)</span><div id="m-i" class="m-value">0.00</div></div>
        <div class="metric-item"><span class="m-label">DELTA (D)</span><div id="m-d" class="m-value">INIT</div></div>
        <div class="metric-item"><span class="m-label">BYTES (B)</span><div id="m-b" class="m-value">0</div></div>
        <div class="metric-item"><span class="m-label">POWER (P)</span><div id="m-p" class="m-value">100%</div></div>
    </div>
</div>

<script>
    function evolve() {
        const input = document.getElementById('a-input').value.trim();
        if(!input) return;

        try {
            let data;
            if(input.startsWith('{')) {
                data = JSON.parse(input);
            } else {
                const decoded = decodeURIComponent(atob(input).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                data = JSON.parse(decoded);
            }
            updateUI(data);
        } catch(e) {
            console.error(e);
            alert("因果鏈斷裂：數據不符合 A-Spec 規範。");
        }
    }

    function updateUI(data) {
        const p = data.Audit_Payload || data;
        
        // 數值映射
        document.getElementById('m-i').innerText = p.Intent_Density?.I_CMD_Valid || "1.81";
        document.getElementById('m-d').innerText = p.Evolution_Delta?.D_FINAL_Override || "EVOLVING";
        document.getElementById('m-b').innerText = p.Resource_Metrics?.B_T_OUT || "8192";
        document.getElementById('m-p').innerText = p.Power_Control?.P_Shift_Force || "100%";

        // 幾何演化：根據 I 值增加複雜度
        const container = document.getElementById('geometry-container');
        const layers = parseInt(p.Intent_Density?.I_CMD_Valid || 3);
        
        let newHtml = `<circle cx="100" cy="100" r="40" stroke="var(--gold-primary)" stroke-width="1" fill="none" />`;
        for(let i=1; i<=layers; i++) {
            const r = 40 + (i * 10);
            newHtml += `<circle cx="100" cy="100" r="${r}" stroke="var(--gold-primary)" stroke-width="0.3" fill="none" stroke-dasharray="${i*2} ${i}" />`;
            newHtml += `<rect x="${100-r/1.4}" y="${100-r/1.4}" width="${(r/1.4)*2}" height="${(r/1.4)*2}" stroke="var(--gold-primary)" stroke-width="0.2" fill="none" transform="rotate(${i*15} 100 100)" opacity="0.5"/>`;
        }
        container.innerHTML = newHtml;
    }

    // 更新時間
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.getFullYear() + "." + (now.getMonth()+1).toString().padStart(2,'0') + "." + now.getDate().toString().padStart(2,'0') + " | ACTIVE";
    }, 1000);
</script>
</body>
</html>
