<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Spec v1.8.1 | 勞動審計</title>
    <style>
        :root { --gold: #CBA37A; --bg: #050505; --text: #D1CEC7; --jade: #82968C; }
        body { background: var(--bg); color: var(--text); font-family: monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .wrapper { width: 100%; max-width: 600px; border: 1px solid rgba(203, 163, 122, 0.3); padding: 20px; box-sizing: border-box; }
        h1 { font-weight: 200; letter-spacing: 5px; color: var(--gold); text-align: center; font-size: 1.5rem; }
        
        .terminal { background: #000; border: 1px solid var(--gold); padding: 15px; margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; background: transparent; border: none; color: var(--jade); font-family: monospace; font-size: 12px; outline: none; resize: none; }
        
        button { background: var(--gold); color: #000; border: none; padding: 15px 0; width: 100%; font-weight: bold; cursor: pointer; letter-spacing: 2px; margin-top: 10px; }

        #result-zone { display: none; margin-top: 20px; border-top: 1px solid var(--gold); padding-top: 20px; width: 100%; }
        .radar-box { background: #000; text-align: center; padding: 10px; border: 1px solid #222; }
        .data-table { width: 100%; margin-top: 20px; font-size: 12px; border-collapse: collapse; }
        .data-table td { padding: 8px; border-bottom: 1px solid #111; }
        .val { color: #fff; text-align: right; }

        .v-seal { margin-top: 30px; border: 1px solid var(--gold); padding: 15px; text-align: center; }
        .v-id { font-size: 18px; color: #fff; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>識位眾生 ． 勞動審計</h1>

    <div class="terminal">
        <textarea id="vault-input" placeholder="貼入 A-ID 長串密碼..."></textarea>
        <button onclick="decodeAndAudit()">執行數據顯化</button>
    </div>

    <div id="result-zone">
        <div class="radar-box" id="radar-svg-wrap"></div>
        
        <table class="data-table">
            <tbody id="audit-body"></tbody>
        </table>

        <div class="v-seal">
            <div style="font-size: 9px; color: var(--jade);">UNIVERSAL LABOR CERTIFICATE</div>
            <div class="v-id" id="v-id-display"></div>
            <div id="summary-text" style="font-size: 11px; color: var(--gold);"></div>
        </div>
    </div>
</div>

<script>
function decodeAndAudit() {
    let input = document.getElementById('vault-input').value.trim();
    if(!input) return;

    // 修正：移除所有可能的干擾字元（如空格、換行）
    input = input.replace(/\s/g, '');

    let json;
    try {
        if (input.startsWith('{')) {
            json = JSON.parse(input);
        } else {
            // 強力解碼：處理 Unicode
            let binary = atob(input);
            let bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            json = JSON.parse(new TextDecoder().decode(bytes));
        }
        renderUI(json);
    } catch (e) {
        alert("解碼失敗：請確認貼入的是正確的 A-ID 密碼。");
    }
}

function renderUI(data) {
    const p = data.Audit_Payload;
    document.getElementById('result-zone').style.display = 'block';
    document.getElementById('v-id-display').innerText = data.Universal_Vajra_Seal;
    document.getElementById('summary-text').innerText = `人類意志覆蓋率：${p.Evolution_Delta.D_FINAL_Override}`;

    document.getElementById('audit-body').innerHTML = `
        <tr><td>指令密度 (I)</td><td class="val">${p.Intent_Density.I_CMD_Valid}</td></tr>
        <tr><td>機率位移 (P)</td><td class="val">${p.Power_Control.P_Shift_Force}</td></tr>
        <tr><td>運算耗損 (B)</td><td class="val">${p.Resource_Metrics.B_T_OUT} Tokens</td></tr>
        <tr><td>推理時長 (T)</td><td class="val">${p.Temporal_Log.T_INF_MS}ms</td></tr>
    `;

    // 簡單幾何圖繪製
    const i = Math.min(p.Intent_Density.I_CMD_Valid * 20, 100);
    const d = parseFloat(p.Evolution_Delta.D_FINAL_Override) || 50;
    document.getElementById('radar-svg-wrap').innerHTML = `
        <svg width="200" height="150" viewBox="0 0 200 150">
            <circle cx="100" cy="75" r="50" fill="none" stroke="#222" stroke-width="1"/>
            <rect x="${100-(i/2)}" y="${75-(d/4)}" width="${i}" height="${d/2}" fill="none" stroke="var(--gold)" stroke-width="2" transform="rotate(45 100 75)"/>
            <circle cx="100" cy="75" r="3" fill="var(--gold)"/>
        </svg>
    `;
}
</script>
</body>
</html>
