<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妙依 · 金剛藏</title>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-primary: #2c3e50;
            --accent: #34495e;
            --border: #dcdde1;
        }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
            padding: 2rem;
            background: white;
        }
        h2 { font-weight: 300; letter-spacing: 2px; text-align: center; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--accent); }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--accent); }
        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            letter-spacing: 1px;
            font-size: 1rem;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        .svg-icon {
            width: 24px;
            height: 24px;
            display: block;
            margin: 0 auto 1rem;
            fill: var(--accent);
        }
        .status { margin-top: 1rem; font-size: 0.85rem; color: #7f8c8d; line-height: 1.6; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <svg class="svg-icon" viewBox="0 0 24 24">
        <path d="M12 1a5 5 0 0 0-5 5v4H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5zm-3 5a3 3 0 0 1 6 0v4H9V6zm3 10a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/>
    </svg>
    
    <h2>金剛藏 · 安全核心</h2>
    
    <div class="input-group">
        <label>主密碼 (Master Password)</label>
        <input type="password" id="masterPwd" placeholder="請輸入主金鑰">
    </div>

    <div class="input-group">
        <label>明文內容 (Data to Encrypt)</label>
        <textarea id="plainText" rows="4" placeholder="輸入需要加密的資訊"></textarea>
    </div>

    <button onclick="handleEncrypt()">執行金剛加密</button>
    
    <div id="output" class="status"></div>
</div>

<script>
    /**
     * 安全加密模組 - 妙依專屬版本
     * 遵循 CC0 協議，無版權爭議
     */

    // 生成隨機鹽值與向量
    const generateSalt = () => window.crypto.getRandomValues(new Uint8Array(16));
    const generateIV = () => window.crypto.getRandomValues(new Uint8Array(12));

    // 從主密碼衍生加密金鑰 (PBKDF2)
    async function deriveKey(password, salt) {
        const encoder = new TextEncoder();
        const baseKey = await window.crypto.subtle.importKey(
            'raw', encoder.encode(password), 'PBKDF2', false, ['deriveKey']
        );
        return window.crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt, iterations: 600000, hash: 'SHA-256' },
            baseKey,
            { name: 'AES-GCM', length: 256 },
            false,
            ['encrypt', 'decrypt']
        );
    }

    // 加密函數
    async function encryptData(password, plainText) {
        const salt = generateSalt();
        const iv = generateIV();
        const key = await deriveKey(password, salt);
        const encoder = new TextEncoder();
        
        const encrypted = await window.crypto.subtle.encrypt(
            { name: 'AES-GCM', iv },
            key,
            encoder.encode(plainText)
        );

        // 將 Salt, IV 與 密文 組合併轉為 Base64
        const result = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        result.set(salt, 0);
        result.set(iv, salt.length);
        result.set(new Uint8Array(encrypted), salt.length + iv.length);
        
        return btoa(String.fromCharCode(...result));
    }

    // 介面處理
    async function handleEncrypt() {
        const pwd = document.getElementById('masterPwd').value;
        const text = document.getElementById('plainText').value;
        const out = document.getElementById('output');

        if (!pwd || !text) {
            out.innerText = "請完整輸入主密碼與內容。";
            return;
        }

        try {
            out.innerText = "計算中，請稍候...";
            const encryptedBase64 = await encryptData(pwd, text);
            out.innerHTML = `<strong>加密完成：</strong><br>${encryptedBase64}`;
        } catch (e) {
            out.innerText = "發生錯誤，請檢查系統環境。";
        }
    }
</script>

</body>
</html>
