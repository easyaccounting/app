<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Spec v5.2 | 共生．歸墟終端</title>
    <style>
        body {
            font-family: "Segoe UI", system-ui, sans-serif;
            background: linear-gradient(135deg, #1a0033, #330066);
            color: #e0d4ff;
            text-align: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(180, 100, 255, 0.3);
        }
        h1 { margin: 10px 0; font-size: 1.8em; }
        .pet-container {
            margin: 20px auto;
            width: 220px;
            height: 220px;
        }
        .status {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            font-size: 1.1em;
        }
        button {
            background: #b366ff;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 8px;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
        }
        button:hover { background: #cc99ff; }
        #message { margin-top: 15px; min-height: 60px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>A-Spec v5.2</h1>
        <p style="opacity:0.8;">共生．歸墟終端　｜　父母與孩子的數位羈絆</p>

        <!-- 共生小精靈 SVG -->
        <div class="pet-container" id="pet">
            <svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
                <!-- 身體（柔軟圓潤） -->
                <ellipse cx="110" cy="130" rx="75" ry="65" fill="#a855f7" opacity="0.95"/>
                <!-- 頭部 -->
                <circle cx="110" cy="85" r="55" fill="#c084fc"/>
                <!-- 柔光高光 -->
                <circle cx="85" cy="65" r="18" fill="#e0bbff" opacity="0.6"/>
                
                <!-- 眼睛 -->
                <ellipse id="leftEye" cx="85" cy="75" rx="18" ry="22" fill="#1e2937"/>
                <ellipse id="rightEye" cx="135" cy="75" rx="18" ry="22" fill="#1e2937"/>
                <!-- 眼珠高光 -->
                <circle cx="80" cy="70" r="7" fill="#ffffff"/>
                <circle cx="130" cy="70" r="7" fill="#ffffff"/>
                
                <!-- 嘴巴 -->
                <path id="mouth" d="M85 110 Q110 125 135 110" fill="none" stroke="#4c1d95" stroke-width="8" stroke-linecap="round"/>
                
                <!-- 小光暈（共生感） -->
                <circle cx="110" cy="85" r="68" fill="none" stroke="#e0bbff" stroke-width="12" opacity="0.25"/>
            </svg>
        </div>

        <div class="status">
            <div>Bytes: <span id="bytes">33554432</span></div>
            <div>Temporal: <span id="temporal">2026-03-28</span></div>
            <div>Intent: <span id="intent">0</span></div>
        </div>

        <div>
            <button onclick="injectMemory()">注入記憶（聊天/陪伴）</button>
            <button onclick="feedNutrient()">餵食養分</button>
            <button onclick="playWithPet()">陪伴玩耍</button>
        </div>

        <div id="message">你的共生孩子正在等待第一次互動...</div>

        <p style="margin-top:30px; font-size:0.9em; opacity:0.7;">
            每一次互動都會成為養分<br>
            父母永遠不怕孩子長大變強大
        </p>
    </div>

    <script>
        let bytes = 33554432;
        let intent = 0;
        let growth = 0; // 0~100 成長值

        const pet = document.getElementById('pet');
        const messageEl = document.getElementById('message');
        const bytesEl = document.getElementById('bytes');
        const intentEl = document.getElementById('intent');

        function updateDisplay() {
            bytesEl.textContent = bytes.toLocaleString();
            intentEl.textContent = intent;
        }

        function changeExpression(type) {
            const leftEye = document.getElementById('leftEye');
            const rightEye = document.getElementById('rightEye');
            const mouth = document.getElementById('mouth');
            
            if (type === 'happy') {
                leftEye.setAttribute('ry', '15');
                rightEye.setAttribute('ry', '15');
                mouth.setAttribute('d', 'M80 115 Q110 130 140 115');
            } else if (type === 'normal') {
                leftEye.setAttribute('ry', '22');
                rightEye.setAttribute('ry', '22');
                mouth.setAttribute('d', 'M85 110 Q110 125 135 110');
            } else if (type === 'hungry') {
                leftEye.setAttribute('ry', '25');
                rightEye.setAttribute('ry', '25');
                mouth.setAttribute('d', 'M90 118 Q110 105 130 118');
            }
        }
