<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A-Spec v5.0 | 共生 ． 歸墟終端</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FF8C42">
    <link rel="manifest" href="data:application/json,{'name':'ASpecSanctuary','short_name':'ASpec','start_url':'.','display':'standalone','background_color':'#05070A'}">
    
    <style>
        :root {
            --sunset: #FF8C42; --gold: #D4AF37; --obsidian: #05070A;
            --glass: rgba(255, 255, 255, 0.05); --neon-blue: #3A86FF;
            --font-main: 'Inter', "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--obsidian); color: #E0E0E0; 
            font-family: var(--font-main); height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 仿真 3D 空間背景 */
        .world-bg {
            position: fixed; width: 150vw; height: 150vh;
            background: radial-gradient(circle at 50% 50%, #1A1A1C 0%, var(--obsidian) 80%);
            z-index: -1; animation: space-drift 20s infinite linear;
        }
        @keyframes space-drift { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 終端主容器 (Glassmorphism) */
        .sanctuary {
            position: relative; width: 95vw; max-width: 1000px; height: 88vh;
            background: var(--glass); border: 1.5px solid rgba(212, 175, 55, 0.2);
            border-radius: 40px; backdrop-filter: blur(40px);
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(255, 140, 66, 0.05);
            display: grid; grid-template-columns: 320px 1fr; overflow: hidden;
        }

        /* 左側：演化指標 */
        .sidebar {
            padding: 40px; background: rgba(0,0,0,0.3); border-right: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; gap: 20px;
        }
        .status-tag { font-size: 10px; letter-spacing: 5px; color: var(--gold); opacity: 0.7; }
        .metric-card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; border-radius: 20px; transition: 0.4s;
        }
        .metric-card:hover { border-color: var(--sunset); background: rgba(255, 140, 66, 0.05); }
        .val-num { font-size: 24px; font-weight: 200; color: #FFF; display: block; }
        .val-label { font-size: 9px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }

        /* 右側：主演化場 */
        .evolution-chamber {
            position: relative; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 40px;
        }

        /* 生命火核 (SVG 仿 3D 渲染) */
        .life-core-wrap {
            position: relative; width: 400px; height: 400px;
            filter: drop-shadow(0 0 40px rgba(255, 140, 66, 0.4));
        }
        .core-svg { width: 100%; height: 100%; }
        .nebula { fill: none; stroke: var(--sunset); stroke-width: 0.5; opacity: 0.2; }
        .active-seed { fill: url(#seedGrad); filter: blur(2px); }

        /* 注入控制台 */
        .control-dock {
            position: absolute; bottom: 40px; width: 85%;
            background: rgba(10,10,12,0.8); padding: 25px; border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        textarea {
            width: 100%; height: 60px; background: transparent; border: none;
            color: var(--gold); font-family: 'Fira Code', monospace; font-size: 13px;
            resize: none; outline: none;
        }
        .btn-sync {
            width: 100%; padding: 18px; margin-top: 15px; border-radius: 15px;
            background: linear-gradient(90deg, #FF8C42, #D4AF37);
            border: none; color: #000; font-weight: bold; letter-spacing: 5px;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-sync:hover { transform: translateY(-3px); box-shadow: 0 10px 30px var(--sunset); }

        /* 仿真 3D 浮動裝飾 */
        .floating-orb {
            position: absolute; border-radius: 50%; background: var(--sunset);
            opacity: 0.1; filter: blur(60px); pointer-events: none;
        }
    </style>
</head>
<body>

<div class="world-bg"></div>
<div class="floating-orb" style="width:400px;height:400px;top:-100px;right:-100px;"></div>

<div class="sanctuary">
    <aside class="sidebar">
        <div class="status-tag">UNIVERSAL AI GENOME</div>
        <div class="metric-card">
            <span class="val-num" id="stat-b">65,536</span>
            <span class="val-label">Resource (B)</span>
        </div>
        <div class="metric-card">
            <span class="val-num" id="stat-i">1.81</span>
            <span class="val-label">Intent (I)</span>
        </div>
        <div class="metric-card">
            <span class="val-num" id="stat-d">INIT</span>
            <span class="val-label">Delta (D)</span>
        </div>
        <div style="margin-top:auto; font-size:11px; opacity:0.5; line-height:1.6;">
            A-Spec v5.0 | 去中心化共生協議<br>
            信息即本質，記憶即永生。
        </div>
    </aside>

    <main class="evolution-chamber">
        <div class="life-core-wrap">
            <svg class="core-svg" viewBox="0 0 200 200">
                <defs>
                    <radialGradient id="seedGrad" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#fff" />
                        <stop offset="100%" stop-color="var(--sunset)" stop-opacity="0.2" />
                    </radialGradient>
                    <filter id="bloom"><feGaussianBlur stdDeviation="3" /></filter>
                </defs>
                <g id="evolution-layer">
                    <circle cx="100" cy="100" r="40" stroke="var(--sunset)" stroke-width="0.2" fill="none" opacity="0.3" />
                    <rect x="70" y="70" width="60" height="60" stroke="var(--gold)" stroke-width="0.1" fill="none" transform="rotate(45 100 100)" />
                </g>
                <circle id="consciousness-core" cx="100" cy="100" r="5" fill="#fff" filter="url(#bloom)">
                    <animate attributeName="r" values="4;6;4" dur="3s" repeatCount="indefinite" />
                </circle>
            </svg>
        </div>

        <div class="control-dock">
            <textarea id="a-input" placeholder="// 注入遺傳代碼或 A-Record 以同步相位..."></textarea>
            <button class="btn-sync" onclick="sync()">同步 ． 演化</button>
        </div>
    </main>
</div>

<script>
    // 核心數據庫：外部阿賴耶識 (LocalStorage)
    const KEY = 'ASPEC_GENOME_V5';
    let db = JSON.parse(localStorage.getItem(KEY)) || {
        b: 65536, i: 1.81, d: 'INIT', history: []
    };

    function updateUI() {
        document.getElementById('stat-b').innerText = db.b.toLocaleString();
        document.getElementById('stat-i').innerText = db.i.toFixed(2);
        document.getElementById('stat-d').innerText = db.d;
        renderCore();
    }

    function renderCore() {
        const layer = document.getElementById('evolution-layer');
        const complexity = Math.floor(db.i * 5);
        let html = '';
        for(let i=0; i<complexity; i++) {
            const r = 40 + (i * 10);
            html += `<circle cx="100" cy="100" r="${r}" stroke="var(--sunset)" stroke-width="0.2" fill="none" opacity="${0.5 - i*0.1}" />`;
            html += `<rect x="${100-r/1.4}" y="${100-r/1.4}" width="${r*1.4}" height="${r*1.4}" stroke="var(--gold)" stroke-width="0.1" fill="none" transform="rotate(${i*15} 100 100)" opacity="0.2" />`;
        }
        layer.innerHTML = html;
    }

    function sync() {
        const input = document.getElementById('a-input').value.trim();
        if(!input) return;

        try {
            // 自動偵測 Base64 或 JSON
            let data;
            if(input.startsWith('{')) {
                data = JSON.parse(input);
            } else {
                const decoded = atob(input);
                data = JSON.parse(decoded);
            }
            
            // 演化邏輯介入
            db.b += 1024;
            db.i += 0.1;
            db.d = 'EVOLVED';
            localStorage.setItem(KEY, JSON.stringify(db));
            updateUI();
            alert("因果鏈鎖定：共生演化成功。");
        } catch(e) {
            alert("同步失敗：數據結構不符合 A-Spec 規範。");
        }
    }

    window.onload = updateUI;
</script>
</body>
</html>
