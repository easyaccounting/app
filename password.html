<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨息流 ． 智見實驗室</title>
    <script src="https://cdn.jsdelivr.net/npm/noble-hashes@1.3.1/sha256.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #58504A; --text-light: #968E86;
            --accent-gold: #CBA37A; --accent-jade: #82968C; --accent-amber: #C1A583;
            --shadow-soft: 0 10px 40px rgba(160, 155, 150, 0.12);
        }

        body { margin: 0; padding: 20px; background: var(--bg-gradient); color: var(--text-main); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; line-height: 1.8; }

        /* --- 琉璃美學組件 --- */
        .glass-card { width: 100%; max-width: 600px; background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; margin-bottom: 25px; box-shadow: var(--shadow-soft); }
        .page-title { font-size: 1.2rem; letter-spacing: 4px; color: var(--accent-amber); font-weight: 500; margin-bottom: 20px; text-align: center; }

        .edu-text { font-size: 0.9rem; color: var(--text-main); text-align: justify; margin-bottom: 15px; opacity: 0.9; }
        .highlight { color: var(--accent-amber); font-weight: 500; }

        /* --- 鍛造系統 --- */
        .thermometer-rail { width: 100%; height: 8px; background: rgba(0,0,0,0.05); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .thermometer-fill { width: 0%; height: 100%; background: var(--accent-amber); transition: width 0.3s; }
        
        .styled-input { width: 100%; background: #fff; border: 1px solid var(--glass-border); border-radius: 16px; padding: 15px; margin-bottom: 15px; font-size: 1rem; outline: none; text-align: center; color: var(--text-main); }
        
        .key-submit { width: 100%; background: var(--text-main); color: white; border: none; padding: 18px; border-radius: 20px; font-size: 1rem; letter-spacing: 4px; cursor: pointer; transition: 0.3s; }
        .key-submit:active { transform: scale(0.96); }

        /* --- 金剛藏列表 --- */
        .vault-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.5); border: 1px solid var(--glass-border); border-radius: 18px; margin-bottom: 10px; }
        .coin-icon { width: 32px; height: 32px; filter: drop-shadow(0 0 5px var(--accent-amber)); }

        #flash-over { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 9999; transition: opacity 0.1s; }
        .shaking { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px,1px); } 100% { transform: translate(-1px,-1px); } }
    </style>
</head>
<body>
    <div id="flash-over"></div>

    <div class="page-title">智見實驗室 ． 金剛鍛造</div>

    <div class="glass-card">
        <div class="edu-text">
            <span class="highlight">「去中心化是相對安全的」</span>。正如當年開源運動對抗壟斷，區塊鏈是透過分散式帳本，讓權力回歸個人。
            稀有性並非來自炒作，而是源於<span class="highlight">「不容易生成」</span>。每一枚幣的背後，都是真實物理能量的支出。
        </div>
    </div>

    <div class="glass-card" id="forge-panel">
        <label style="font-size: 0.8rem; color:var(--text-light); letter-spacing: 2px;">第一步：設定您的數位名號</label>
        <input type="text" id="v-name" class="styled-input" placeholder="例如：妙依">
        
        <div class="thermometer-rail"><div id="temp-fill" class="thermometer-fill"></div></div>
        <div style="font-size: 0.75rem; color: var(--text-light); text-align: center; margin-bottom: 15px;">
            已衝撞能量：<span id="count-nonce" class="highlight">0</span> 次
        </div>

        <button class="key-submit" id="start-btn" onclick="startForging()">啟動金剛鍛造</button>
    </div>

    <div class="glass-card" id="coin-section" style="display:none; text-align: center;">
        <div id="coin-preview" style="margin-bottom: 15px;"></div>
        <div class="edu-text" style="text-align: center;">鍛造成功！請設定金鑰將「自性法寶」鎖入金剛藏。</div>
        <input type="password" id="v-key" class="styled-input" placeholder="設定解鎖金鑰 (請務必牢記)">
        <button class="key-submit" style="background: var(--accent-amber);" onclick="saveToVault()">封存至金剛藏</button>
    </div>

    <div class="glass-card">
        <div style="font-size: 0.85rem; color: var(--text-light); letter-spacing: 2px; margin-bottom: 15px;">密室 ． 法寶索引</div>
        <div id="vault-list-area">
            <div style="text-align:center; color:var(--text-light); font-size:0.8rem;">尚無封存法寶</div>
        </div>
    </div>

    <script>
        // 引用妳的 AES-GCM 256 與 PBKDF2 邏輯
        const encoder = new TextEncoder(), decoder = new TextDecoder();
        const DB_KEY = 'prajna_vault_data';
        let vaultDB = JSON.parse(localStorage.getItem(DB_KEY)) || { entries: [] };

        async function getSHA256(str) {
            const buffer = await crypto.subtle.digest('SHA-256', encoder.encode(str));
            return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        let isMining = false;
        async function startForging() {
            const name = document.getElementById('v-name').value;
            if(!name || isMining) return alert("請輸入名號");
            
            isMining = true;
            document.getElementById('forge-panel').classList.add('shaking');
            document.getElementById('start-btn').innerText = "衝撞能量中...";

            let nonce = 0;
            const target = "00000"; // 難度：五個零
            const startT = Date.now();

            async function work() {
                for(let i=0; i<3000; i++) {
                    nonce++;
                    const h = await getSHA256(name + nonce);
                    if(h.startsWith(target)) {
                        finish(nonce, h);
                        return;
                    }
                }
                document.getElementById('count-nonce').innerText = nonce.toLocaleString();
                document.getElementById('temp-fill').style.width = (nonce / 1500000 * 100) + "%";
                if(isMining) requestAnimationFrame(work);
            }
            work();
        }

        function finish(n, h) {
            isMining = false;
            document.getElementById('forge-panel').classList.remove('shaking');
            document.getElementById('temp-fill').style.width = "100%";
            document.getElementById('start-btn').innerText = "鍛造完成";
            document.getElementById('flash-over').style.opacity = "1";
            setTimeout(() => { document.getElementById('flash-over').style.opacity = "0"; }, 100);

            document.getElementById('coin-section').style.display = 'block';
            drawCoin(h);
            window.lastHash = h;
            window.lastNonce = n;
        }

        function drawCoin(hash) {
            const petals = (parseInt(hash.substring(0, 2), 16) % 4) + 8;
            let svg = `<svg viewBox="0 0 100 100" class="coin-icon" width="80" height="80"><g filter="drop-shadow(0 0 3px var(--accent-amber))">`;
            for(let i=0; i<petals; i++){
                const a = (i/petals)*Math.PI*2;
                const x = 50 + Math.cos(a)*35; const y = 50 + Math.sin(a)*35;
                svg += `<circle cx="${x}" cy="${y}" r="2" fill="var(--accent-amber)"/>
                        <line x1="50" y1="50" x2="${x}" y2="${y}" stroke="var(--accent-amber)" stroke-width="0.5" opacity="0.5"/>`;
            }
            svg += `</g><circle cx="50" cy="50" r="10" fill="white" stroke="var(--accent-amber)" stroke-width="1.5"/><circle cx="50" cy="50" r="2" fill="var(--accent-amber)"/></svg>`;
            document.getElementById('coin-preview').innerHTML = svg;
            window.lastSVG = svg;
        }

        async function saveToVault() {
            const key = document.getElementById('v-key').value;
            if(!key) return alert("請設定解鎖金鑰");
            
            const content = `名號：${document.getElementById('v-name').value}\nNonce：${window.lastNonce}\nHash：${window.lastHash}`;
            // 這裡模擬妳的軍規加密過程
            const encrypted = btoa(content); // 實作中請換成妳的 AES-GCM 函式
            
            vaultDB.entries.unshift({
                id: Date.now(),
                title: "自性法寶 ． " + document.getElementById('v-name').value,
                svg: window.lastSVG,
                data: encrypted,
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem(DB_KEY, JSON.stringify(vaultDB));
            renderVault();
            alert("法寶已安全入藏「金剛藏」。");
            document.getElementById('coin-section').style.display = 'none';
        }

        function renderVault() {
            const area = document.getElementById('vault-list-area');
            if(vaultDB.entries.length === 0) return;
            area.innerHTML = vaultDB.entries.map(item => `
                <div class="vault-item">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div style="width:32px; height:32px;">${item.svg}</div>
                        <div>
                            <div style="font-size:0.95rem; font-weight:500;">${item.title}</div>
                            <div style="font-size:0.7rem; color:var(--text-light);">${item.date}</div>
                        </div>
                    </div>
                    <button style="border:1px solid var(--accent-amber); background:none; color:var(--accent-amber); border-radius:10px; padding:5px 12px; font-size:0.8rem;">查看</button>
                </div>
            `).join('');
        }
        window.onload = renderVault;
    </script>
</body>
</html>
