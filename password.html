<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>般若模擬考場 - 全真模擬系統</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --glass-bg: rgba(232, 240, 254, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --text-main: #333333;
            --accent-color: #5c7c99;
            --success-color: #6b8e23;
            --error-color: #c0504d;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .exam-info { font-weight: bold; color: var(--accent-color); }
        .timer { font-size: 1.2rem; font-weight: bold; background: #fff; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--glass-border); }

        .main-layout { display: flex; flex: 1; padding: 20px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .content-panel { flex: 1; background: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--glass-border); overflow-y: auto; max-height: 80vh; display: none; }
        .question-panel { flex: 1; background: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--glass-border); overflow-y: auto; max-height: 80vh; }

        .section-header { background: var(--glass-bg); padding: 10px; border-radius: 8px; margin-bottom: 20px; color: var(--accent-color); font-weight: bold; }
        .question-block { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed #ddd; }
        .option-label { display: block; padding: 10px; background: #f9f9f9; margin: 5px 0; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .option-label:hover { background: var(--glass-bg); }

        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
        textarea { height: 200px; line-height: 1.6; }

        .nav-footer { background: var(--glass-bg); padding: 20px; text-align: center; border-top: 1px solid var(--glass-border); }
        .btn { padding: 10px 25px; background: var(--accent-color); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        .footer-link { margin-top: 15px; font-size: 0.8rem; }
        .footer-link a { color: var(--accent-color); text-decoration: none; }

        .active { display: block !important; }
        .full-width { flex: 2 !important; }
    </style>
</head>
<body>

<header>
    <div class="exam-info">般若全真模擬考場</div>
    <div class="timer" id="timer">100:00</div>
</header>

<div class="main-layout">
    <div class="content-panel" id="leftPanel"></div>
    <div class="question-panel" id="rightPanel">
        <div id="examContainer"></div>
    </div>
</div>

<div class="nav-footer">
    <button class="btn" onclick="processSubmission()">提交全卷並計算得分</button>
    <div id="scoreResult" style="margin-top:15px; font-weight:bold; color:var(--accent-color); display:none;"></div>
    <div class="footer-link">
        永遠保持 99 分的謙卑 · <a href="https://namoamitabhapureland.github.io/bodhicitta/index.html" target="_blank">彌陀淨土系統</a>
    </div>
</div>

<script>
// 使用者未來可分別天數增加 JSON 內容，此處各題型預留一題作為架構樣板
const examData = {
    totalTime: 6000,
    sections: [
        {
            id: 1, name: "第一部分：詞彙題", type: "mcq_single",
            questions: [{ id: "s1q1", text: "1. The teacher emphasized the importance of self-reflection to help students become more ______.", options: {A:"arrogant", B:"humble", C:"stubborn", D:"clumsy"}, answer: "B", score: 2 }]
        },
        {
            id: 2, name: "第二部分：綜合測驗", type: "cloze",
            article: "Compassion is a fundamental virtue in many cultures. __2__ practicing kindness, we not only help others but also find peace within ourselves...",
            questions: [{ id: "s2q2", text: "2.", options: {A:"By", B:"With", C:"For", D:"In"}, answer: "A", score: 2 }]
        },
        {
            id: 3, name: "第三部分：文意選填", type: "filling",
            article: "Digital life has changed how we interact. Many people find it __3__ to maintain long-distance relationships through video calls...",
            options: ["A. essential", "B. difficult", "C. temporary", "D. flexible"],
            answers: { "3": "A" }, scorePerBlank: 2
        },
        {
            id: 4, name: "第四部分：篇章結構", type: "discourse",
            article: "Artificial intelligence is evolving rapidly. __4__ However, the human touch remains indispensable in creative works.",
            options: ["A. It can analyze data in seconds.", "B. Many people fear job loss.", "C. Robots are becoming cheaper."],
            answers: { "4": "A" }, scorePerBlank: 2
        },
        {
            id: 5, name: "第五部分：閱讀測驗", type: "reading",
            article: "The concept of 'Zero Waste' has gained popularity worldwide. It encourages people to redesign their lifestyles to minimize trash...",
            questions: [{ id: "s5q5", text: "5. What is the main idea of this passage?", options: {A:"The history of trash", B:"The benefits of zero waste", C:"How to build a factory"}, answer: "B", score: 2 }]
        },
        {
            id: 6, name: "第六部分：非選擇題", type: "essay",
            prompts: [
                { id: "s6t1", text: "中譯英：保持謙卑是智慧的開始。", ref: "Remaining humble is the beginning of wisdom.", score: 8 },
                { id: "s6e1", text: "英文作文：請描述一次幫助他人的經驗（約120字）。", maxScore: 20 }
            ]
        }
    ]
};

function renderExam() {
    const container = document.getElementById('examContainer');
    const leftPanel = document.getElementById('leftPanel');
    let html = '';

    examData.sections.forEach(sec => {
        html += `<div class="section-header">${sec.name}</div>`;
        
        if (sec.type === "mcq_single") {
            sec.questions.forEach(q => {
                html += `<div class="question-block"><p>${q.text}</p>`;
                for (let [k, v] of Object.entries(q.options)) {
                    html += `<label class="option-label"><input type="radio" name="${q.id}" value="${k}"> (${k}) ${v}</label>`;
                }
                html += `</div>`;
            });
        } else if (sec.type === "cloze" || sec.type === "reading") {
            // 點擊此類題目時啟動左側文章
            html += `<button class="btn" style="background:#8faadc; margin-bottom:15px;" onclick="showArticle('${btoa(unescape(encodeURIComponent(sec.article)))}')">閱讀本段文章</button>`;
            sec.questions.forEach(q => {
                html += `<div class="question-block"><p>${q.text}</p>`;
                for (let [k, v] of Object.entries(q.options)) {
                    html += `<label class="option-label"><input type="radio" name="${q.id}" value="${k}"> (${k}) ${v}</label>`;
                }
                html += `</div>`;
            });
        } else if (sec.type === "filling" || sec.type === "discourse") {
            html += `<button class="btn" style="background:#8faadc; margin-bottom:15px;" onclick="showArticle('${btoa(unescape(encodeURIComponent(sec.article)))}')">閱讀填空文章</button>`;
            html += `<p>選項庫：${sec.options.join(' / ')}</p>`;
            Object.keys(sec.answers).forEach(num => {
                html += `<div class="question-block">格號 ${num}：<input type="text" name="fill_${sec.id}_${num}" placeholder="輸入代號如 A"></div>`;
            });
        } else if (sec.type === "essay") {
            sec.prompts.forEach(p => {
                html += `<div class="question-block"><p>${p.text}</p><textarea name="${p.id}"></textarea></div>`;
            });
        }
    });
    container.innerHTML = html;
}

function showArticle(base64Art) {
    const leftPanel = document.getElementById('leftPanel');
    const rightPanel = document.getElementById('rightPanel');
    leftPanel.innerHTML = `<h2 style="color:var(--accent-color)">閱讀材料</h2><p style="line-height:2; font-size:1.1rem;">${decodeURIComponent(escape(atob(base64Art)))}</p>`;
    leftPanel.classList.add('active');
    rightPanel.classList.remove('full-width');
}

function processSubmission() {
    let score = 0;
    examData.sections.forEach(sec => {
        if (sec.type === "mcq_single" || sec.type === "cloze" || sec.type === "reading") {
            sec.questions.forEach(q => {
                const userAns = document.querySelector(`input[name="${q.id}"]:checked`)?.value;
                if (userAns === q.answer) score += q.score;
            });
        } else if (sec.type === "filling" || sec.type === "discourse") {
            Object.entries(sec.answers).forEach(([num, ans]) => {
                const userAns = document.querySelector(`input[name="fill_${sec.id}_${num}"]`)?.value.toUpperCase();
                if (userAns === ans) score += sec.scorePerBlank;
            });
        }
    });
    
    const resultDiv = document.getElementById('scoreResult');
    resultDiv.innerHTML = `選擇題得分結算：${score} 分。非選擇題（翻譯與作文）請參考官方樣板進行自我評估。`;
    resultDiv.style.display = 'block';
    alert("全卷已批改完成，請查看下方得分回饋。");
}

let timeLeft = examData.totalTime;
setInterval(() => {
    if(timeLeft <= 0) return;
    timeLeft--;
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
}, 1000);

window.onload = renderExam;
</script>
</body>
</html>
