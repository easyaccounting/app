<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>般若模擬考場 - 全題型與解答檢討系統</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --glass-bg: rgba(232, 240, 254, 0.7);
            --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #333333;
            --accent-color: #5c7c99;
            --success-color: #558b2f; /* 溫和的草綠色 */
            --error-color: #c62828; /* 沉穩的磚紅色 */
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; 
        }

        header {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .timer { font-size: 1.1rem; font-weight: bold; color: var(--accent-color); background: #fff; padding: 4px 12px; border-radius: 15px; border: 1px solid var(--glass-border); }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* 左側文章區塊 */
        .content-panel {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #fff;
            border-right: 1px solid #eee;
            display: none; 
        }

        /* 右側題目區塊 */
        .question-panel {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #fafafa;
        }

        /* 手機版響應式設計：改為上下堆疊 */
        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .content-panel { flex: none; height: 40vh; border-right: none; border-bottom: 2px solid var(--accent-color); display: block !important; }
            .question-panel { flex: 1; padding: 20px; }
        }

        .section-tag { display: inline-block; padding: 4px 10px; background: var(--accent-color); color: #fff; border-radius: 4px; font-size: 0.8rem; margin-bottom: 15px; }
        .question-block { margin-bottom: 35px; padding-bottom: 15px; border-bottom: 1px dashed #e0e0e0; }
        .question-text { font-size: 1.05rem; line-height: 1.6; margin-bottom: 15px; }
        
        .option-label { display: block; padding: 12px; background: #fff; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; transition: 0.2s; }
        .option-label:hover { border-color: var(--accent-color); background: var(--glass-bg); }
        .option-label.disabled { cursor: not-allowed; opacity: 0.7; }

        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; box-sizing: border-box; font-family: inherit; }
        textarea { height: 150px; line-height: 1.6; resize: vertical; }
        input:disabled, textarea:disabled { background-color: #f5f5f5; cursor: not-allowed; }

        /* 解答檢視區塊 */
        .review-box { margin-top: 15px; padding: 12px; border-radius: 8px; font-weight: bold; display: none; background: #fff; border-left: 5px solid; }
        .review-box.correct { border-left-color: var(--success-color); color: var(--success-color); background: #f1f8e9; }
        .review-box.wrong { border-left-color: var(--error-color); color: var(--error-color); background: #ffebee; }
        .review-box.info { border-left-color: var(--accent-color); color: var(--accent-color); background: var(--glass-bg); }

        .nav-footer { background: #fff; padding: 15px 30px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 10px 20px; background: var(--accent-color); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .active { display: block !important; }
        .full-width { flex: 2 !important; max-width: 900px; margin: 0 auto; background: #fff; border-left: 1px solid #eee; border-right: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <div id="sectionTitle" style="font-weight:bold; color:var(--accent-color); font-size:1.2rem;">加載中...</div>
    <div id="totalScoreDisplay" style="font-weight:bold; color:var(--success-color); display:none; font-size:1.2rem;"></div>
    <div class="timer" id="timer">100:00</div>
</header>

<div class="main-layout" id="mainLayout">
    <div class="content-panel" id="leftPanel"></div>
    <div class="question-panel" id="rightPanel">
        <div id="sectionContent"></div>
    </div>
</div>

<div class="nav-footer">
    <button class="btn" id="prevBtn" onclick="changeSection(-1)">上一大題</button>
    <div id="progressInfo" style="font-size: 0.95rem; color: #666; font-weight:bold;">大題 1 / 6</div>
    <button class="btn" id="nextBtn" onclick="changeSection(1)">下一大題</button>
    <button class="btn" id="submitBtn" style="display:none; background:#558b2f;" onclick="finalizeExam()">交卷並檢視解答</button>
</div>

<script>
// 全題型資料庫 (每大題 2 題測試版)
const examData = {
    totalTime: 6000,
    sections: [
        {
            id: 1, name: "第一部分：詞彙題 (Vocabulary)", type: "mcq", article: null,
            questions: [
                { id: "q1", text: "1. The scientist made a _____ discovery that completely changed our understanding of the universe.", options: {A:"profound", B:"superficial", C:"clumsy", D:"arrogant"}, answer: "A", points: 2 },
                { id: "q2", text: "2. During the drought, the local government urged citizens to _____ water whenever possible.", options: {A:"pollute", B:"consume", C:"conserve", D:"distribute"}, answer: "C", points: 2 }
            ]
        },
        {
            id: 2, name: "第二部分：綜合測驗 (Cloze Test)", type: "mcq",
            article: "Have you ever noticed how a simple smile can change someone's day? Studies show that smiling is contagious. __3__ you smile at a stranger, they are highly likely to smile back. This small act of kindness creates a ripple effect, spreading positivity __4__ the entire community.",
            questions: [
                { id: "q3", text: "3.", options: {A:"Before", B:"When", C:"Although", D:"Unless"}, answer: "B", points: 2 },
                { id: "q4", text: "4.", options: {A:"throughout", B:"instead of", C:"except for", D:"according to"}, answer: "A", points: 2 }
            ]
        },
        {
            id: 3, name: "第三部分：文意選填 (Blank Filling)", type: "text_input",
            article: "Option Pool: (A) essential  (B) exhausted  (C) nutrients  (D) temporarily<br><br>Getting enough sleep is __5__ for both physical and mental health. During sleep, our bodies repair cells and process information. If you stay up late for several days, you will undoubtedly feel completely __6__ and find it hard to focus.",
            questions: [
                { id: "q5", text: "5. 請輸入選項代號 (如 A, B, C, D)：", answer: "A", points: 2 },
                { id: "q6", text: "6. 請輸入選項代號 (如 A, B, C, D)：", answer: "B", points: 2 }
            ]
        },
        {
            id: 4, name: "第四部分：篇章結構 (Discourse Structure)", type: "text_input",
            article: "Option Pool:<br>(A) It reduces the amount of waste sent to landfills.<br>(B) However, many people still find it inconvenient.<br><br>Recycling is one of the easiest ways to protect our environment. __7__ By sorting our plastic, paper, and glass, we give these materials a second life. __8__ To solve this, local governments are providing clearer instructions.",
            questions: [
                { id: "q7", text: "7. 請輸入選項代號 (如 A, B)：", answer: "A", points: 2 },
                { id: "q8", text: "8. 請輸入選項代號 (如 A, B)：", answer: "B", points: 2 }
            ]
        },
        {
            id: 5, name: "第五部分：閱讀測驗 (Reading Comprehension)", type: "mcq",
            article: "Deep sea exploration has always fascinated humanity. The Mariana Trench, the deepest part of the ocean, is home to creatures that have adapted to extreme pressure and total darkness. Recent expeditions have discovered new species of jellyfish that glow in the dark. These findings prove that life can thrive in the most hostile environments on Earth.",
            questions: [
                { id: "q9", text: "9. What is the main idea of this passage?", options: {A:"The dangers of deep sea diving.", B:"How to catch jellyfish.", C:"Life existing in extreme deep sea conditions.", D:"The history of the Mariana Trench."}, answer: "C", points: 2 },
                { id: "q10", text: "10. According to the passage, what is special about the newly discovered jellyfish?", options: {A:"They are very large.", B:"They can glow in the dark.", C:"They swim very fast.", D:"They can survive on land."}, answer: "B", points: 2 }
            ]
        },
        {
            id: 6, name: "第六部分：非選擇題 (Translation & Essay)", type: "essay", article: null,
            questions: [
                { id: "q11", text: "中譯英：保持謙卑是獲得真智慧的第一步。", answer: "Remaining humble is the first step to gaining true wisdom.", points: 8 },
                { id: "q12", text: "英文作文：請寫一篇約 120 字的文章，描述你如何克服生活中的一個困難。", answer: "【評分標準參考】系統將依據字數、句型多樣性與詞彙等級進行綜合評分。文章應具備清晰的主題句與具體細節。", points: 20 }
            ]
        }
    ]
};

let currentSectionIndex = 0;
const userAnswers = {};
let examSubmitted = false;
let totalScore = 0;
let timerInterval;

function renderCurrentSection() {
    const section = examData.sections[currentSectionIndex];
    const leftPanel = document.getElementById('leftPanel');
    const rightPanel = document.getElementById('rightPanel');
    const sectionContent = document.getElementById('sectionContent');
    
    document.getElementById('sectionTitle').innerText = section.name;
    document.getElementById('progressInfo').innerText = `大題 ${currentSectionIndex + 1} / ${examData.sections.length}`;

    // 文章面板排版邏輯
    if (section.article) {
        leftPanel.innerHTML = `<div class="section-tag">閱讀材料</div><div style="line-height:2; font-size:1.1rem; color:#444;">${section.article}</div>`;
        leftPanel.classList.add('active');
        rightPanel.classList.remove('full-width');
    } else {
        leftPanel.classList.remove('active');
        rightPanel.classList.add('full-width');
    }

    let html = '';
    section.questions.forEach(q => {
        html += `<div class="question-block"><div class="question-text">${q.text}</div>`;
        
        const currentAns = userAnswers[q.id] || '';
        const disabledAttr = examSubmitted ? 'disabled' : '';
        const disabledClass = examSubmitted ? 'disabled' : '';

        // 依據題型渲染作答區
        if (section.type === "mcq") {
            for (let [k, v] of Object.entries(q.options)) {
                const checked = currentAns === k ? 'checked' : '';
                html += `<label class="option-label ${disabledClass}">
                    <input type="radio" name="${q.id}" value="${k}" ${checked} ${disabledAttr} onchange="saveAnswer('${q.id}', '${k}')"> (${k}) ${v}
                </label>`;
            }
        } else if (section.type === "text_input") {
            html += `<input type="text" id="${q.id}" value="${currentAns}" ${disabledAttr} placeholder="請輸入答案" oninput="saveAnswer('${q.id}', this.value.toUpperCase().trim())">`;
        } else if (section.type === "essay") {
            html += `<textarea id="${q.id}" ${disabledAttr} placeholder="請在此輸入內容..." oninput="saveAnswer('${q.id}', this.value)">${currentAns}</textarea>`;
        }

        // 檢討模式：顯示正確解答
        if (examSubmitted) {
            if (section.type === "mcq" || section.type === "text_input") {
                const isCorrect = currentAns === q.answer;
                const boxClass = isCorrect ? 'correct' : 'wrong';
                const statusText = isCorrect ? '答對了！' : `答錯了。您的答案：${currentAns || '未作答'}`;
                html += `<div class="review-box ${boxClass}" style="display:block;">${statusText}<br>正確解答：${q.answer}</div>`;
            } else if (section.type === "essay") {
                html += `<div class="review-box info" style="display:block;">官方參考解答 / 評分標準：<br><span style="font-weight:normal;">${q.answer}</span></div>`;
            }
        }

        html += `</div>`;
    });
    
    sectionContent.innerHTML = html;

    // 按鈕控制
    document.getElementById('prevBtn').disabled = (currentSectionIndex === 0);
    if (currentSectionIndex === examData.sections.length - 1) {
        document.getElementById('nextBtn').style.display = 'none';
        if (!examSubmitted) document.getElementById('submitBtn').style.display = 'block';
    } else {
        document.getElementById('nextBtn').style.display = 'block';
        document.getElementById('submitBtn').style.display = 'none';
    }
}

function saveAnswer(qId, val) {
    if(!examSubmitted) userAnswers[qId] = val;
}

function changeSection(direction) {
    currentSectionIndex += direction;
    renderCurrentSection();
    document.getElementById('rightPanel').scrollTop = 0; 
    document.getElementById('leftPanel').scrollTop = 0;
}

function finalizeExam() {
    if(!confirm("確定要交卷嗎？交卷後將無法修改答案，並直接顯示正式解答。")) return;
    
    examSubmitted = true;
    clearInterval(timerInterval);
    document.getElementById('timer').innerText = "測驗結束";
    document.getElementById('timer').style.background = "#f5f5f5";
    document.getElementById('timer').style.color = "#999";
    
    // 計算選擇題與填空題分數
    totalScore = 0;
    let maxObjectiveScore = 0;
    
    examData.sections.forEach(sec => {
        if (sec.type === "mcq" || sec.type === "text_input") {
            sec.questions.forEach(q => {
                maxObjectiveScore += q.points;
                if (userAnswers[q.id] === q.answer) {
                    totalScore += q.points;
                }
            });
        }
    });

    const scoreDisplay = document.getElementById('totalScoreDisplay');
    scoreDisplay.innerText = `客觀題得分：${totalScore} / ${maxObjectiveScore} (非選擇題請看檢討)`;
    scoreDisplay.style.display = 'block';
    document.getElementById('submitBtn').style.display = 'none';

    // 回到第一大題開始檢討
    currentSectionIndex = 0;
    renderCurrentSection();
    alert("交卷完成！系統已為您批改客觀題。您可以透過「下一大題」瀏覽每一題的正式解答與您的作答比對。");
}

let timeLeft = examData.totalTime;
timerInterval = setInterval(() => {
    if(timeLeft <= 0) {
        finalizeExam();
        return;
    }
    timeLeft--;
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
}, 1000);

window.onload = renderCurrentSection;
</script>
</body>
</html>
