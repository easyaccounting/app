<div class="main-container" id="view-security">
    
    <div class="health-card" style="border-left: 4px solid var(--accent-amber);">
        <div class="card-header">
            <div class="card-title">
                <svg class="card-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                金剛藏 · 使用守則
            </div>
        </div>
        <div style="font-size: 0.85rem; color: var(--text-main); line-height: 1.6; letter-spacing: 0.5px;">
            1. **無痕加密**：本系統不儲存您的主密碼，金鑰僅存在於計算瞬間。<br>
            2. **密鑰一致**：若主密碼輸入錯誤，還原出的內容將會是亂碼或解密失敗。<br>
            3. **本地存續**：所有操作均在瀏覽器本地完成，絕不經過伺服器，真正達成淨息流的自性安全。
        </div>
    </div>

    <div class="health-card">
        <div class="card-header">
            <div class="card-title">
                <svg class="card-icon" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>
                隨機金鑰生成
            </div>
            <div class="status-tag">安全等級：高</div>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
            <div style="flex: 1; font-family: monospace; font-size: 1.2rem; background: rgba(255,255,255,0.4); padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); text-align: center; color: var(--accent-amber);" id="gen-output">********</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="gen-len" value="16" min="8" max="64" class="styled-input" style="flex: 0.3; text-align: center;">
            <button class="m-btn m-btn-confirm" style="flex: 0.7; height: 45px;" onclick="generateVajraPwd()">生成安全字串</button>
        </div>
    </div>

    <div class="health-card">
        <div class="card-header">
            <div class="card-title">
                <svg class="card-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                金剛藏 · 加密核心
            </div>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div>
                <label style="font-size: 0.8rem; color: var(--text-light); margin-left: 5px;">主密碼 (Master Password)</label>
                <input type="password" id="vault-master" class="styled-input" placeholder="請輸入主金鑰" style="margin-top: 5px;">
            </div>
            <div>
                <label style="font-size: 0.8rem; color: var(--text-light); margin-left: 5px;">內容 (明文或密文)</label>
                <textarea id="vault-data" class="styled-input" rows="4" placeholder="輸入需要處理的資訊" style="margin-top: 5px; resize: none;"></textarea>
            </div>
            
            <div class="btn-group" style="display: flex; gap: 10px;">
                <button class="m-btn m-btn-confirm" onclick="processVault('encrypt')">執行加密</button>
                <button class="m-btn m-btn-cancel" style="background: var(--accent-amber-light); border-color: var(--accent-amber); color: var(--accent-amber);" onclick="processVault('decrypt')">智慧還原</button>
            </div>
        </div>

        <div id="vault-status" class="status" style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.4); border-radius: 12px; display: none; border: 1px dashed var(--accent-amber);">
            </div>
    </div>
</div>

<script>
    /**
     * 金剛藏加密邏輯 - 完美整合至淨息流架構
     */
    
    // 生成隨機密碼 (符合 1Password 安全邏輯)
    function generateVajraPwd() {
        const len = document.getElementById('gen-len').value;
        const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";
        let retVal = "";
        const bytes = new Uint32Array(len);
        window.crypto.getRandomValues(bytes);
        for (let i = 0; i < len; i++) {
            retVal += charset.charAt(bytes[i] % charset.length);
        }
        document.getElementById('gen-output').innerText = retVal;
    }

    // PBKDF2 金鑰衍生函數
    async function deriveVaultKey(password, salt) {
        const encoder = new TextEncoder();
        const baseKey = await window.crypto.subtle.importKey(
            'raw', encoder.encode(password), 'PBKDF2', false, ['deriveKey']
        );
        return window.crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt, iterations: 600000, hash: 'SHA-256' },
            baseKey, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
        );
    }

    // 核心處理函數
    async function processVault(mode) {
        const pwd = document.getElementById('vault-master').value;
        const data = document.getElementById('vault-data').value;
        const statusEl = document.getElementById('vault-status');
        
        if (!pwd || !data) {
            alert("請輸入完整的主密碼與內容。");
            return;
        }

        try {
            statusEl.style.display = 'block';
            statusEl.innerText = "計算中...";

            if (mode === 'encrypt') {
                const salt = window.crypto.getRandomValues(new Uint8Array(16));
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const key = await deriveVaultKey(pwd, salt);
                const encrypted = await window.crypto.subtle.encrypt(
                    { name: 'AES-GCM', iv }, key, new TextEncoder().encode(data)
                );
                
                const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
                combined.set(salt, 0);
                combined.set(iv, 16);
                combined.set(new Uint8Array(encrypted), 28);
                
                const b64 = btoa(String.fromCharCode(...combined));
                statusEl.innerHTML = `<div style="color:var(--text-light); font-size:0.7rem; margin-bottom:5px;">加密完成（請複製保存）：</div><div style="word-break:break-all; user-select:all; color:var(--text-main); font-family:monospace;">${b64}</div>`;
            } else {
                const raw = Uint8Array.from(atob(data), c => c.charCodeAt(0));
                const salt = raw.slice(0, 16);
                const iv = raw.slice(16, 28);
                const encrypted = raw.slice(28);
                
                const key = await deriveVaultKey(pwd, salt);
                const decrypted = await window.crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv }, key, encrypted
                );
                
                const plainText = new TextDecoder().decode(decrypted);
                statusEl.innerHTML = `<div style="color:var(--text-light); font-size:0.7rem; margin-bottom:5px;">還原成功：</div><div style="color:var(--accent-amber); font-weight:500;">${plainText}</div>`;
            }
        } catch (e) {
            statusEl.innerHTML = `<span style="color:var(--accent-red);">操作失敗：金鑰錯誤或資料格式不正確。</span>`;
        }
    }

    // 更新您的 switchStage 函數，確保能切換到 security
    // (這部分請根據您現有的 switchStage 邏輯自行微調)
</script>
