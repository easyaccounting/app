<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>般若模擬考場 - 人性化分頁系統</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --glass-bg: rgba(232, 240, 254, 0.7);
            --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #333333;
            --accent-color: #5c7c99;
            --btn-hover: #4a647c;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* 防止整頁滑動，改用區塊獨立滑動 */
        }

        /* 頂部導覽 */
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .timer { font-size: 1.1rem; font-weight: bold; color: var(--accent-color); background: #fff; padding: 4px 12px; border-radius: 15px; border: 1px solid var(--glass-border); }

        /* 主佈局：預設左右分割 (平板/電腦) */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* 左側文章區塊 */
        .content-panel {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #fff;
            border-right: 1px solid #eee;
            display: none; /* 初始隱藏，有文章才顯示 */
        }

        /* 右側題目區塊 */
        .question-panel {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #fafafa;
        }

        /* 手機版響應式設計：改為上下堆疊 */
        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .content-panel { flex: none; height: 35vh; border-right: none; border-bottom: 2px solid var(--accent-color); display: block !important; }
            .question-panel { flex: 1; }
        }

        .section-tag { display: inline-block; padding: 4px 10px; background: var(--accent-color); color: #fff; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; }
        .question-block { margin-bottom: 30px; }
        .option-label { display: block; padding: 12px; background: #fff; margin: 8px 0; border-radius: 8px; border: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .option-label:hover { border-color: var(--accent-color); background: var(--glass-bg); }

        /* 底部控制列 */
        .nav-footer {
            background: #fff;
            padding: 15px 30px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn { padding: 10px 20px; background: var(--accent-color); color: #fff; border: none; border-radius: 6px; cursor: pointer; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .active { display: block !important; }
        .full-width { flex: 2 !important; }
    </style>
</head>
<body>

<header>
    <div id="sectionTitle" style="font-weight:bold; color:var(--accent-color);">加載中...</div>
    <div class="timer" id="timer">100:00</div>
</header>

<div class="main-layout" id="mainLayout">
    <div class="content-panel" id="leftPanel"></div>
    <div class="question-panel" id="rightPanel">
        <div id="sectionContent"></div>
    </div>
</div>

<div class="nav-footer">
    <button class="btn" id="prevBtn" onclick="changeSection(-1)">上一大題</button>
    <div id="progressInfo" style="font-size: 0.9rem; color: #666;">大題 1 / 6</div>
    <button class="btn" id="nextBtn" onclick="changeSection(1)">下一大題</button>
    <button class="btn" id="submitBtn" style="display:none; background:#6b8e23;" onclick="finalizeExam()">提交全卷</button>
</div>

<script>
// 考卷資料結構 (使用者可分天數增加題目內容)
const examData = {
    totalTime: 6000,
    sections: [
        {
            id: 0, name: "第一部分：詞彙題", type: "mcq", article: null,
            questions: [
                { id: "q1", text: "1. Respecting others' boundaries is ______ for maintaining a healthy relationship.", options: {A:"optional", B:"essential", C:"superficial", D:"temporary"}, answer: "B" }
                // 使用者可在此處繼續增加 q2, q3... 到 15 題
            ]
        },
        {
            id: 1, name: "第二部分：綜合測驗", type: "mcq",
            article: "Mindfulness is the practice of being present. __2__ we focus on the now, anxiety tends to decrease...",
            questions: [
                { id: "q2", text: "2.", options: {A:"When", B:"Unless", C:"Though", D:"Until"}, answer: "A" }
            ]
        }
        // 使用者可在此處繼續增加第 3 至 6 大題
    ]
};

let currentSectionIndex = 0;
const userAnswers = {};

function renderCurrentSection() {
    const section = examData.sections[currentSectionIndex];
    const leftPanel = document.getElementById('leftPanel');
    const rightPanel = document.getElementById('rightPanel');
    const sectionContent = document.getElementById('sectionContent');
    const sectionTitle = document.getElementById('sectionTitle');
    const progressInfo = document.getElementById('progressInfo');

    // 更新大題標題與進度
    sectionTitle.innerText = section.name;
    progressInfo.innerText = `大題 ${currentSectionIndex + 1} / ${examData.sections.length}`;

    // 處理左右分割排版邏輯
    if (section.article) {
        leftPanel.innerHTML = `<div class="section-tag">閱讀材料</div><div style="line-height:2; font-size:1.1rem;">${section.article}</div>`;
        leftPanel.classList.add('active');
        rightPanel.classList.remove('full-width');
    } else {
        leftPanel.classList.remove('active');
        rightPanel.classList.add('full-width');
    }

    // 渲染題目
    let html = '';
    section.questions.forEach(q => {
        html += `<div class="question-block"><p>${q.text}</p>`;
        for (let [k, v] of Object.entries(q.options)) {
            const checked = userAnswers[q.id] === k ? 'checked' : '';
            html += `<label class="option-label">
                <input type="radio" name="${q.id}" value="${k}" ${checked} onchange="saveAnswer('${q.id}', '${k}')"> (${k}) ${v}
            </label>`;
        }
        html += `</div>`;
    });
    sectionContent.innerHTML = html;

    // 按鈕狀態控制
    document.getElementById('prevBtn').disabled = (currentSectionIndex === 0);
    if (currentSectionIndex === examData.sections.length - 1) {
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('submitBtn').style.display = 'block';
    } else {
        document.getElementById('nextBtn').style.display = 'block';
        document.getElementById('submitBtn').style.display = 'none';
    }
}

function saveAnswer(qId, val) {
    userAnswers[qId] = val;
}

function changeSection(direction) {
    currentSectionIndex += direction;
    renderCurrentSection();
    document.getElementById('rightPanel').scrollTop = 0; // 切換大題後置頂
    document.getElementById('leftPanel').scrollTop = 0;
}

function finalizeExam() {
    if(confirm("確定要交卷嗎？")) {
        // 此處可擴充批改邏輯
        alert("全卷批改完成。");
    }
}

// 倒數計時器
let timeLeft = examData.totalTime;
setInterval(() => {
    if(timeLeft <= 0) return;
    timeLeft--;
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
}, 1000);

window.onload = renderCurrentSection;
</script>
</body>
</html>
