<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>柔光記帳</title>
    <style>
        :root {
            /* 柔光玻璃色彩系統 */
            --bg-gradient: linear-gradient(135deg, #F9F8F6, #EAE6DF);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px rgba(180, 175, 170, 0.15);
            
            --text-main: #5C544E;
            --text-light: #9A928B;
            --accent-gold: #D4A373;
            --accent-red: #D89A9E;
            
            /* 分類專屬柔和色彩 */
            --cat-food: #E2B4B7;   /* 飲食: 柔玫瑰 */
            --cat-trans: #A8C2CB;  /* 交通: 灰霧藍 */
            --cat-house: #D4A373;  /* 居住: 陶土金 */
            --cat-ent: #8BA89C;    /* 育樂: 青蓮綠 */
            --cat-beauty: #DDA7A5; /* 服飾美容: 胭脂粉 */
            --cat-other: #C4B7CB;  /* 其他: 丁香紫 */
        }

        body {
            margin: 0; padding: 0; background: var(--bg-gradient); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; display: flex; justify-content: center; overflow: hidden;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        /* 視窗總容器 (限制手機寬度，隱藏超出部分) */
        .app-viewport {
            width: 100%; max-width: 400px; height: 100%; position: relative; overflow: hidden;
        }

        /* 單一視圖的基礎設定 */
        .view-layer {
            position: absolute; top: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 第一層：主畫面 (初始位置 0) */
        #main-view { transform: translateX(0); }
        /* 第二層：報表畫面 (初始位置在右側視線外 100%) */
        #report-view { transform: translateX(100%); }

        /* ================= 頂部導航 ================= */
        .header-bar {
            width: 90%; display: flex; justify-content: space-between; align-items: center;
            margin-top: 20px; margin-bottom: 10px; z-index: 10;
        }
        .nav-btn {
            background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; color: var(--text-main);
            display: flex; align-items: center; gap: 8px; cursor: pointer; box-shadow: var(--glass-shadow);
            transition: all 0.2s;
        }
        .nav-btn:active { transform: scale(0.95); }
        .icon-btn { padding: 8px; border-radius: 50%; width: 36px; height: 36px; justify-content: center; }

        /* ================= 主畫面區塊 ================= */
        .balance-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; transition: transform 0.4s; }
        .balance-label { font-size: 0.9rem; letter-spacing: 2px; color: var(--text-light); margin-bottom: 5px; }
        .balance-amount { font-size: 3.5rem; font-weight: 300; color: var(--accent-gold); text-shadow: 0 4px 15px rgba(212, 163, 115, 0.2); transition: opacity 0.3s;}
        
        .category-grid {
            width: 90%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding-bottom: 40px; transition: transform 0.4s;
        }
        .cat-btn {
            background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow); border-radius: 20px; aspect-ratio: 1 / 1;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; cursor: pointer; transition: all 0.2s;
        }
        .cat-btn:active, .cat-btn.active { background: rgba(255, 255, 255, 0.8); transform: scale(0.95); border-color: var(--accent-gold); }
        .cat-btn svg { width: 28px; height: 28px; stroke: var(--text-main); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .cat-btn.active svg { stroke: var(--accent-gold); }
        .cat-btn span { font-size: 0.85rem; color: var(--text-main); font-weight: 500; }

        /* ================= 鍵盤與細項膠囊 ================= */
        .keyboard-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(249, 248, 246, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border);
            box-shadow: 0 -10px 40px rgba(180, 175, 170, 0.1); border-radius: 30px 30px 0 0; padding: 20px;
            box-sizing: border-box; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 100;
        }
        .keyboard-panel.open { transform: translateY(0); }

        .input-display {
            text-align: right; font-size: 2.5rem; color: var(--text-main); padding: 0 10px; margin-bottom: 15px;
            border-bottom: 1px solid rgba(92, 84, 78, 0.1); height: 50px; display: flex; align-items: center; justify-content: flex-end;
        }

        /* 橫向滑動細項膠囊 */
        .sub-tags-wrapper {
            width: 100%; overflow-x: auto; white-space: nowrap; padding: 0 0 15px 0; margin-bottom: 10px;
            -ms-overflow-style: none; scrollbar-width: none; opacity: 0; transition: opacity 0.3s;
        }
        .sub-tags-wrapper::-webkit-scrollbar { display: none; }
        .sub-tags-wrapper.show { opacity: 1; }
        .sub-tag {
            display: inline-block; background: rgba(255, 255, 255, 0.5); border: 1px solid var(--glass-border);
            color: var(--text-light); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; margin-right: 10px; cursor: pointer; transition: all 0.2s;
        }
        .sub-tag.selected { background: rgba(255, 255, 255, 0.9); color: var(--text-main); border-color: var(--accent-gold); font-weight: 500; transform: scale(0.95);}

        .key-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .key { background: transparent; border: none; font-size: 1.5rem; color: var(--text-main); height: 55px; border-radius: 15px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: background 0.2s; font-weight: 300; }
        .key:active { background: rgba(0, 0, 0, 0.05); }
        .key-enter { grid-row: span 2; background: var(--accent-gold); color: white; border-radius: 20px; font-size: 1.8rem; box-shadow: 0 4px 15px rgba(212, 163, 115, 0.4); }

        /* ================= 報表畫面區塊 ================= */
        .chart-card {
            width: 90%; background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border);
            border-radius: 30px; box-shadow: var(--glass-shadow); padding: 30px 20px; display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; flex-shrink: 0; box-sizing: border-box;
        }
        .chart-container { position: relative; width: 180px; height: 180px; }
        svg.donut { width: 100%; height: 100%; transform: rotate(-90deg); overflow: visible; }
        .donut-segment { fill: transparent; stroke-width: 3.5; stroke-linecap: round; transition: stroke-dasharray 1s ease-out; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.08)); }
        
        .chart-center-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .total-label { font-size: 0.8rem; color: var(--text-light); letter-spacing: 1px; margin-bottom: 4px; }
        .total-amount { font-size: 1.8rem; font-weight: 300; color: var(--text-main); }
        .budget-hint { font-size: 0.7rem; color: var(--accent-gold); margin-top: 4px; opacity: 0.8; }

        .list-container { width: 90%; flex: 1; overflow-y: auto; padding-bottom: 40px; -ms-overflow-style: none; scrollbar-width: none; }
        .list-container::-webkit-scrollbar { display: none; }
        .list-header { font-size: 0.85rem; color: var(--text-light); letter-spacing: 1px; margin-bottom: 15px; padding-left: 5px; }
        .trans-item { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(180, 175, 170, 0.08); }
        .trans-left { display: flex; align-items: center; gap: 15px; }
        .cat-color-dot { width: 12px; height: 12px; border-radius: 50%; }
        .trans-info { display: flex; flex-direction: column; gap: 4px; }
        .trans-title { font-size: 0.95rem; font-weight: 500; color: var(--text-main); }
        .trans-time { font-size: 0.75rem; color: var(--text-light); }
        .trans-amt { font-size: 1.1rem; font-weight: 400; color: var(--text-main); }
    </style>
</head>
<body>

<div class="app-viewport">
    
    <div id="main-view" class="view-layer">
        <div class="header-bar">
            <div class="nav-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5v14M8 5v14M12 5v14M16 5v14M20 5v14"/></svg>
                /12ABCDE
            </div>
            <div class="nav-btn icon-btn" onclick="toggleView('report')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
            </div>
        </div>

        <div class="balance-section" id="balance-sec">
            <div class="balance-label">本月結餘</div>
            <div class="balance-amount" id="main-balance">$15,000</div>
        </div>

        <div class="category-grid" id="cat-grid">
            <div class="cat-btn" onclick="openKeyboard(this, '飲食')">
                <svg viewBox="0 0 24 24"><path d="M4 11h16a8 8 0 0 1-16 0z"/><path d="M12 3v4M8 4v3M16 4v3"/></svg><span>飲食</span>
            </div>
            <div class="cat-btn" onclick="openKeyboard(this, '服飾美容')">
                <svg viewBox="0 0 24 24"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg><span>服飾美容</span>
            </div>
            <div class="cat-btn" onclick="openKeyboard(this, '居住')">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>居住</span>
            </div>
            <div class="cat-btn" onclick="openKeyboard(this, '交通')">
                <svg viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="10" rx="2"/><circle cx="8" cy="18" r="2"/><circle cx="16" cy="18" r="2"/><path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg><span>交通</span>
            </div>
            <div class="cat-btn" onclick="openKeyboard(this, '育樂進修')">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg><span>育樂進修</span>
            </div>
            <div class="cat-btn" onclick="openKeyboard(this, '其他生活')">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/><circle cx="5" cy="12" r="2"/></svg><span>其他生活</span>
            </div>
        </div>

        <div class="keyboard-panel" id="keyboard">
            <div class="sub-tags-wrapper" id="sub-tags-container"></div>
            
            <div class="input-display" id="input-amt">0</div>
            <div class="key-grid">
                <button class="key" onclick="inputNum(1)">1</button>
                <button class="key" onclick="inputNum(2)">2</button>
                <button class="key" onclick="inputNum(3)">3</button>
                <button class="key" onclick="deleteNum()">⌫</button>
                <button class="key" onclick="inputNum(4)">4</button>
                <button class="key" onclick="inputNum(5)">5</button>
                <button class="key" onclick="inputNum(6)">6</button>
                <button class="key key-enter" onclick="submitEntry()">✓</button>
                <button class="key" onclick="inputNum(7)">7</button>
                <button class="key" onclick="inputNum(8)">8</button>
                <button class="key" onclick="inputNum(9)">9</button>
                <button class="key" onclick="closeKeyboard()">取消</button>
                <button class="key" onclick="inputNum(0)">0</button>
                <button class="key" onclick="inputNum('00')">00</button>
            </div>
        </div>
    </div>

    <div id="report-view" class="view-layer">
        <div class="header-bar">
            <div class="nav-btn icon-btn" onclick="toggleView('main')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <div style="font-weight: 500; letter-spacing: 2px;">本月分析</div>
            <div style="width: 36px;"></div> </div>

        <div class="chart-card">
            <div class="chart-container">
                <svg class="donut" viewBox="0 0 42 42" id="donut-chart"></svg>
                <div class="chart-center-text">
                    <div class="total-label">總支出</div>
                    <div class="total-amount" id="total-disp">$0</div>
                    <div class="budget-hint" id="budget-disp">預算 $15,000</div>
                </div>
            </div>
        </div>

        <div class="list-container">
            <div class="list-header">近期明細</div>
            <div id="trans-list"></div>
        </div>
    </div>

</div>

<script>
    // ================= 核心狀態與資料庫 =================
    let balance = 15000;
    const budgetLimit = 15000;
    let transactions = []; // 初始為空，記帳後動態新增

    // 分類顏色對應 (用於報表)
    const colorMap = {
        '飲食': 'var(--cat-food)', '服飾美容': 'var(--cat-beauty)',
        '居住': 'var(--cat-house)', '交通': 'var(--cat-trans)',
        '育樂進修': 'var(--cat-ent)', '其他生活': 'var(--cat-other)'
    };

    // 視圖切換邏輯 (水平滑動)
    function toggleView(target) {
        const main = document.getElementById('main-view');
        const report = document.getElementById('report-view');
        
        if (target === 'report') {
            closeKeyboard(); // 確保鍵盤收起
            main.style.transform = 'translateX(-100%)';
            report.style.transform = 'translateX(0)';
            initReport(); // 每次進入報表時重新繪製最新資料
        } else {
            main.style.transform = 'translateX(0)';
            report.style.transform = 'translateX(100%)';
        }
    }

    // ================= 鍵盤與細項邏輯 =================
    const categoryData = {
        '飲食': ['早餐', '午餐', '晚餐', '宵夜', '飲料', '小吃點心', '便利商店', '水果'],
        '服飾美容': ['衣服', '鞋包', '化妝保養品', '理髮', '醫美'],
        '交通': ['大眾運輸', '計程車', '加油/充電', '停車費', '車子美容', '車子保養'],
        '居住': ['租金/房貸', '管理費', '網路費'],
        '育樂進修': ['電影展覽', '數位訂閱', '國內外旅遊', '書籍', '補習費', '學費', '3C產品'],
        '其他生活': ['電話費', '保險費', '醫療', '交際孝親', '信用卡']
    };

    let currentInput = "0";
    let activeBtn = null;
    let currentSubTag = "";
    
    const kb = document.getElementById('keyboard');
    const display = document.getElementById('input-amt');
    const mainBal = document.getElementById('main-balance');

    function renderSubTags(categoryName) {
        const container = document.getElementById('sub-tags-container');
        container.innerHTML = ''; currentSubTag = "";
        
        const tags = categoryData[categoryName] || [];
        tags.forEach(tag => {
            const el = document.createElement('div');
            el.className = 'sub-tag';
            el.innerText = tag;
            el.onclick = function() {
                Array.from(container.children).forEach(t => t.classList.remove('selected'));
                this.classList.add('selected');
                currentSubTag = tag;
                this.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            };
            container.appendChild(el);
        });
        setTimeout(() => container.classList.add('show'), 50);
    }

    function openKeyboard(btn, category) {
        if(activeBtn) activeBtn.classList.remove('active');
        activeBtn = btn; activeBtn.classList.add('active');
        currentInput = "0"; updateDisplay(); renderSubTags(category);
        
        document.getElementById('balance-sec').style.transform = "translateY(-20px) scale(0.95)";
        document.getElementById('cat-grid').style.transform = "translateY(-15px)";
        kb.classList.add('open');
    }

    function closeKeyboard() {
        if(activeBtn) activeBtn.classList.remove('active');
        activeBtn = null;
        document.getElementById('balance-sec').style.transform = "translateY(0) scale(1)";
        document.getElementById('cat-grid').style.transform = "translateY(0)";
        kb.classList.remove('open');
        document.getElementById('sub-tags-container').classList.remove('show');
    }

    function updateDisplay() { display.innerText = currentInput === "" ? "0" : Number(currentInput).toLocaleString(); }
    function inputNum(num) { 
        if (currentInput === "0" && num !== "00") currentInput = num.toString();
        else if(currentInput.length < 8) currentInput += num.toString();
        updateDisplay();
    }
    function deleteNum() {
        if (currentInput.length > 1) currentInput = currentInput.slice(0, -1);
        else currentInput = "0";
        updateDisplay();
    }

    // ★ 關鍵：記帳送出並連動報表資料 ★
    function submitEntry() {
        let amt = Number(currentInput);
        let category = activeBtn ? activeBtn.querySelector('span').innerText : '未分類';
        let subCategory = currentSubTag || '一般';
        
        if(amt > 0) {
            balance -= amt; // 扣除結餘
            
            // 動態新增一筆交易紀錄到陣列最前面
            transactions.unshift({
                id: Date.now(),
                cat: category,
                sub: subCategory,
                amt: amt,
                time: '剛剛',
                color: colorMap[category] || 'var(--cat-other)'
            });

            mainBal.style.opacity = 0;
            setTimeout(() => {
                mainBal.innerText = "$" + balance.toLocaleString();
                mainBal.style.opacity = 1;
            }, 200);
        }
        closeKeyboard();
    }

    // ================= 報表生成邏輯 =================
    function initReport() {
        const listDiv = document.getElementById('trans-list');
        const donut = document.getElementById('donut-chart');
        let totalAmt = 0; let catTotals = {};
        
        listDiv.innerHTML = ''; // 清空舊明細

        if(transactions.length === 0) {
            listDiv.innerHTML = '<div style="text-align:center; color:var(--text-light); margin-top:20px; font-size:0.85rem;">目前尚無紀錄，開始記下第一筆帳吧。</div>';
        }

        transactions.forEach(t => {
            totalAmt += t.amt;
            if(!catTotals[t.cat]) catTotals[t.cat] = { amt: 0, color: t.color };
            catTotals[t.cat].amt += t.amt;

            const item = document.createElement('div');
            item.className = 'trans-item';
            item.innerHTML = `
                <div class="trans-left">
                    <div class="cat-color-dot" style="background: ${t.color}"></div>
                    <div class="trans-info">
                        <div class="trans-title">${t.cat} - ${t.sub}</div>
                        <div class="trans-time">${t.time}</div>
                    </div>
                </div>
                <div class="trans-amt">-$${t.amt}</div>
            `;
            listDiv.appendChild(item);
        });

        const totalDisp = document.getElementById('total-disp');
        const budgetDisp = document.getElementById('budget-disp');
        totalDisp.innerText = '$' + totalAmt.toLocaleString();
        totalDisp.style.color = 'var(--text-main)'; // 重置顏色
        budgetDisp.style.color = 'var(--accent-gold)';

        if (totalAmt > budgetLimit) {
            totalDisp.style.color = 'var(--accent-red)';
            budgetDisp.innerText = '已超預算';
            budgetDisp.style.color = 'var(--accent-red)';
        } else if (totalAmt > budgetLimit * 0.8) {
            budgetDisp.innerText = `剩餘 $${(budgetLimit - totalAmt).toLocaleString()}`;
        } else {
            budgetDisp.innerText = `預算 $${budgetLimit.toLocaleString()}`;
        }

        let cumulativePercent = 0;
        donut.innerHTML = '';
        
        Object.keys(catTotals).forEach(cat => {
            let percent = (catTotals[cat].amt / totalAmt) * 100;
            let visiblePercent = percent > 2 ? percent - 1.5 : percent; // 留白處理

            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", "21"); circle.setAttribute("cy", "21"); circle.setAttribute("r", "15.9155");
            circle.setAttribute("class", "donut-segment"); circle.setAttribute("stroke", catTotals[cat].color);
            
            circle.style.strokeDasharray = `0 100`;
            circle.style.strokeDashoffset = `-${cumulativePercent}`;
            donut.appendChild(circle);

            setTimeout(() => { circle.style.strokeDasharray = `${visiblePercent} ${100 - visiblePercent}`; }, 50);
            cumulativePercent += percent;
        });
    }
</script>

</body>
</html>
