<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>生活輕鬆記 ． 淨息流</title>
    <style>
        :root {
            --bg-deep: #F2F5F4;
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #EAEFEA);
            --text-main: #58504A; --text-light: #968E86;
            
            /* 四大法界專屬琉璃色光 */
            --accent-gold: #CBA37A;  /* 財務 */
            --accent-jade: #82968C;  /* 健康 */
            --accent-rose: #CFA4A4;  /* 母嬰 */
            --accent-amber: #C1A583; /* 毛孩 */
            
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.9);
            --shadow-ambient: 0 15px 40px rgba(130, 140, 135, 0.15);
            --shadow-hover: 0 20px 50px rgba(130, 140, 135, 0.25);
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-gradient); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; -webkit-user-select: none; user-select: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- 法界微光呼吸背景 (純 CSS 取代圖片) --- */
        .ambient-light {
            position: absolute; width: 150vw; height: 150vw; max-width: 800px; max-height: 800px;
            background: radial-gradient(circle, rgba(203, 163, 122, 0.08) 0%, rgba(130, 150, 140, 0.05) 40%, rgba(255,255,255,0) 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 0; pointer-events: none;
            animation: breatheLight 8s infinite alternate ease-in-out;
        }
        @keyframes breatheLight {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* --- 主容器中道收斂 --- */
        .portal-container {
            width: 100%; max-width: 500px; padding: 30px;
            z-index: 10; display: flex; flex-direction: column; align-items: center;
        }

        /* --- 標題美學 --- */
        .header-section { text-align: center; margin-bottom: 40px; }
        
        .main-title {
            font-size: 2.4rem; font-weight: 300; letter-spacing: 8px; color: var(--text-main);
            margin: 0 0 15px 0; text-indent: 8px; /* 平衡字距 */
            text-shadow: 0 4px 15px rgba(255, 255, 255, 0.8);
        }
        
        /* 清淨宣告 (取代廉價的廣告字眼) */
        .pure-statement {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-size: 0.85rem; color: var(--accent-gold); letter-spacing: 3px; font-weight: 400;
        }
        .pure-line {
            width: 40px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }

        /* --- 琉璃方陣 (2x2 Grid) --- */
        .portal-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%;
        }

        .portal-card {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            aspect-ratio: 1 / 1.1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px;
            box-shadow: var(--shadow-ambient); cursor: pointer; text-decoration: none;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); position: relative; overflow: hidden;
        }
        
        /* 懸停與點擊的絲滑物理反饋 */
        .portal-card:active { transform: scale(0.95) translateY(4px); box-shadow: 0 5px 15px rgba(130, 140, 135, 0.1); }
        
        /* 卡片專屬色光 Hover 效果 (針對有滑鼠的裝置) */
        @media (hover: hover) {
            .portal-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); background: rgba(255,255,255,0.85); }
        }

        .card-icon-wrap {
            width: 55px; height: 55px; border-radius: 50%; background: #fff;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.04); transition: transform 0.4s;
        }
        .portal-card:active .card-icon-wrap { transform: scale(0.9); }

        .card-icon { width: 26px; height: 26px; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        
        .card-title { font-size: 1rem; font-weight: 500; color: var(--text-main); letter-spacing: 2px; }
        .card-sub { font-size: 0.75rem; color: var(--text-light); letter-spacing: 1px; }

        /* 四大法界顏色指派 */
        .mod-fin .card-icon { stroke: var(--accent-gold); }
        .mod-health .card-icon { stroke: var(--accent-jade); }
        .mod-mom .card-icon { stroke: var(--accent-rose); }
        .mod-pet .card-icon { stroke: var(--accent-amber); }

        /* 即將開發的蒙版 */
        .coming-soon { position: absolute; inset: 0; background: rgba(255,255,255,0.6); backdrop-filter: blur(2px); display: flex; justify-content: center; align-items: center; font-size: 0.85rem; color: var(--text-light); letter-spacing: 2px; font-weight: 500; opacity: 0; transition: opacity 0.3s; }
        .portal-card:active .coming-soon { opacity: 1; }

        /* 底部落款 */
        .footer-mark {
            position: absolute; bottom: 30px; font-size: 0.75rem; color: var(--text-light);
            letter-spacing: 2px; display: flex; align-items: center; gap: 8px;
        }
        .footer-mark svg { width: 14px; height: 14px; stroke: var(--text-light); fill: none; }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <div class="portal-container">
        
        <div class="header-section">
            <h1 class="main-title">生活輕鬆記</h1>
            <div class="pure-statement">
                <div class="pure-line"></div>
                清淨 ． 永久免費無廣告
                <div class="pure-line"></div>
            </div>
        </div>

        <div class="portal-grid">
            
            <a href="accounting.html" class="portal-card mod-fin">
                <div class="card-icon-wrap">
                    <svg class="card-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                </div>
                <div style="text-align: center;">
                    <div class="card-title">財務收支</div>
                    <div class="card-sub">理財與預算</div>
                </div>
            </a>

            <a href="health.html" class="portal-card mod-health">
                <div class="card-icon-wrap">
                    <svg class="card-icon" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <div style="text-align: center;">
                    <div class="card-title">健康觀照</div>
                    <div class="card-sub">身心與數據</div>
                </div>
            </a>

            <div class="portal-card mod-mom" onclick="alert('「孕母與育兒」模組靜心開發中，敬請期待。')">
                <div class="card-icon-wrap">
                    <svg class="card-icon" viewBox="0 0 24 24"><path d="M12 22c0-5.5-4.5-10-10-10 5.5 0 10-4.5 10-10 0 5.5 4.5 10 10 10-5.5 0-10 4.5-10 10z"/></svg>
                </div>
                <div style="text-align: center;">
                    <div class="card-title">孕母與育兒</div>
                    <div class="card-sub">生命之初</div>
                </div>
                <div class="coming-soon">開發中</div>
            </div>

            <div class="portal-card mod-pet" onclick="alert('「毛孩手冊」模組靜心開發中，敬請期待。')">
                <div class="card-icon-wrap">
                    <svg class="card-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path><circle cx="8" cy="10" r="1.5"></circle><circle cx="12" cy="8" r="1.5"></circle><circle cx="16" cy="10" r="1.5"></circle><path d="M12 18c-2 0-3.5-1.5-3.5-3s1.5-2.5 3.5-2.5S15.5 13.5 15.5 15 14 18 12 18z"></path></svg>
                </div>
                <div style="text-align: center;">
                    <div class="card-title">毛孩手冊</div>
                    <div class="card-sub">萬物皆有靈</div>
                </div>
                <div class="coming-soon">開發中</div>
            </div>

        </div>
    </div>

    <div class="footer-mark" onclick="window.location.href='https://namoamitabhapureland.github.io/bodhicitta/index.html'" style="cursor:pointer;">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
        淨息流 ． 彌陀淨土系統
    </div>

    <script>
        // ================= 萬法歸一：本機藏識 (DB) 開天闢地 =================
        // 繼承總工程師的嚴謹邏輯，啟動大廳時即刻檢查並修補所有模組的資料庫
        window.onload = function() {
            initEcosystemDB();
        };

        function initEcosystemDB() {
            // 1. 財務記帳 DB (joy_accounting_app_data)
            let accDB;
            try {
                accDB = JSON.parse(localStorage.getItem('joy_accounting_app_data'));
                if (!accDB || typeof accDB !== 'object') accDB = null;
                if (accDB && !accDB.transactions) accDB.transactions = [];
                if (accDB && typeof accDB.budget === 'undefined') accDB.budget = 15000;
                if (accDB && !accDB.carrier) accDB.carrier = "";
            } catch(e) { accDB = null; }

            if (!accDB) {
                accDB = { budget: 15000, carrier: "", transactions: [] };
            }
            localStorage.setItem('joy_accounting_app_data', JSON.stringify(accDB));

            // 2. 健康歷史 DB (joy_health_history)
            let healthHistory;
            try {
                healthHistory = JSON.parse(localStorage.getItem('joy_health_history'));
                if (!healthHistory || typeof healthHistory !== 'object') healthHistory = null;
                if (healthHistory && !healthHistory.med) healthHistory.med = [];
                if (healthHistory && !healthHistory.bp) healthHistory.bp = [];
                if (healthHistory && !healthHistory.bs) healthHistory.bs = [];
                if (healthHistory && !healthHistory.wt) healthHistory.wt = [];
            } catch(e) { healthHistory = null; }

            if (!healthHistory) {
                healthHistory = { med: [], bp: [], bs: [], wt: [] };
            }
            localStorage.setItem('joy_health_history', JSON.stringify(healthHistory));

            // 3. 健康今日暫存 DB (joy_health_today)
            let healthToday;
            try {
                healthToday = JSON.parse(localStorage.getItem('joy_health_today'));
                if (!healthToday || typeof healthToday !== 'object') healthToday = null;
                if (healthToday && !healthToday.med) healthToday.med = { "早晨": null, "中午": null, "晚間": null, "睡前": null };
            } catch(e) { healthToday = null; }

            if (!healthToday) {
                healthToday = {
                    date: "", userHeight: 170,
                    med: { "早晨": null, "中午": null, "晚間": null, "睡前": null },
                    bp: { sys: 0, dia: 0, tag: "" },
                    bs: { val: 0, tag: "" },
                    wt: { val: 0 }
                };
            }
            localStorage.setItem('joy_health_today', JSON.stringify(healthToday));

            // 未來擴充：孕母與毛孩的預留空間...
            // localStorage.setItem('joy_mom_data', JSON.stringify({...}));
        }
    </script>
</body>
</html>
