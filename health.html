<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>淨息流 ． 健康觀照</title>
    <style>
        :root {
            --bg-deep: #F2F5F4; --bg-gradient: linear-gradient(135deg, #F9FAF9, #E6EBE9);
            --glass-bg: rgba(255, 255, 255, 0.65); --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #58504A; --text-light: #968E86;
            --accent-gold: #CBA37A; --accent-jade: #82968C; --accent-red: #D29498;
            --shadow-soft: 0 10px 40px rgba(160, 155, 150, 0.12);
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-gradient); color: var(--text-main); font-family: -apple-system, sans-serif; overflow-x: hidden; -webkit-user-select: none; user-select: none; }

        /* 頂部與側邊欄 (省略重複的樣式細節以聚焦核心) */
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 800; padding: max(15px, env(safe-area-inset-top)) 20px 15px; display: flex; justify-content: center; background: linear-gradient(to bottom, rgba(249,250,249,0.95), rgba(249,250,249,0)); }
        .nav-content { width: 100%; max-width: 720px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); cursor: pointer; transition: all 0.2s; }
        .nav-btn:active { transform: scale(0.92); }
        .nav-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
        .page-title { font-size: 1.15rem; font-weight: 500; letter-spacing: 3px; color: var(--accent-jade); }

        .main-container { width: 100%; max-width: 720px; margin: 0 auto; padding: calc(85px + env(safe-area-inset-top)) 20px 100px; display: flex; flex-direction: column; gap: 20px; }
        .health-card { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 22px; box-shadow: var(--shadow-soft); position: relative; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .health-card:active { transform: scale(0.98); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-title { display: flex; align-items: center; gap: 10px; font-size: 1.05rem; font-weight: 500; letter-spacing: 1px; }
        .card-icon { width: 22px; height: 22px; stroke: var(--accent-jade); fill: none; stroke-width: 1.8; }
        .value-display { display: flex; align-items: flex-end; gap: 8px; }
        .main-value { font-size: 2.2rem; font-weight: 300; line-height: 1; transition: color 0.3s; }
        .sub-value { font-size: 1rem; color: var(--text-light); margin-bottom: 4px; }
        .action-hint { font-size: 0.75rem; color: var(--accent-gold); letter-spacing: 1px; margin-top: 10px; display: flex; align-items: center; gap: 4px; }
        .action-hint svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

        /* --- 智慧輸入抽屜 --- */
        .bottom-drawer { position: fixed; bottom: 0; left: 0; width: 100vw; background: rgba(252, 251, 249, 0.95); backdrop-filter: blur(25px); border-top: 1px solid var(--glass-border); border-radius: 35px 35px 0 0; box-shadow: 0 -15px 50px rgba(160, 155, 150, 0.1); transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 2000; display: flex; flex-direction: column; align-items: center; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .bottom-drawer.open { transform: translateY(0); }
        .drawer-content { width: 100%; max-width: 720px; padding: 0 25px; display: flex; flex-direction: column; }
        .drawer-handle { width: 40px; height: 4px; background: rgba(150,142,134,0.3); border-radius: 2px; margin: 15px auto 5px; cursor: pointer; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .drawer-title { font-size: 1.15rem; color: var(--text-main); letter-spacing: 2px; font-weight: 500; }

        /* 狀態標籤 (空腹/飯後, 早上/晚上) */
        .sub-tags-wrapper { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .sub-tag { background: rgba(255, 255, 255, 0.5); border: 1px solid var(--glass-border); color: var(--text-light); padding: 6px 14px; border-radius: 16px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .sub-tag.selected { background: var(--glass-bg); color: var(--accent-jade); border-color: var(--accent-jade); font-weight: 500; box-shadow: 0 2px 8px rgba(130,150,140,0.1); }

        /* 動態輸入顯示區 */
        .input-display-area { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin-bottom: 10px; min-height: 70px; }
        
        .bp-input-group { display: flex; align-items: flex-end; gap: 10px; }
        .input-box { font-size: 3.2rem; font-weight: 300; color: var(--text-light); border-bottom: 1px solid transparent; padding: 0 5px; min-width: 70px; text-align: center; transition: all 0.3s; cursor: pointer; }
        .input-box.active { color: var(--accent-jade); border-bottom: 2px solid var(--accent-jade); }
        .input-box.warning { color: var(--accent-red); border-bottom-color: var(--accent-red); }
        
        .input-slash { font-size: 2.5rem; font-weight: 300; color: var(--text-light); padding-bottom: 5px; }
        .input-unit { font-size: 1rem; color: var(--text-light); padding-bottom: 10px; }
        
        .medical-hint { font-size: 0.8rem; text-align: center; color: var(--text-light); min-height: 20px; margin-bottom: 15px; letter-spacing: 1px; transition: color 0.3s; }
        .medical-hint.warning { color: var(--accent-red); font-weight: 500; }

        /* 數字鍵盤 */
        .key-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key { background: rgba(255,255,255,0.6); border: 1px solid var(--glass-border); border-radius: 20px; height: 58px; font-size: 1.6rem; color: var(--text-main); font-weight: 300; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: all 0.15s; }
        .key:active { transform: scale(0.92); background: rgba(255,255,255,0.95); }
        .key-ac { color: var(--accent-red); font-weight: 400; font-size: 1.2rem; letter-spacing: 1px; }
        .key-submit { grid-column: span 3; background: var(--accent-gold); color: white; border: none; font-weight: 400; letter-spacing: 4px; box-shadow: 0 4px 15px rgba(203, 163, 122, 0.2); }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-content">
            <div class="nav-btn"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></div>
            <div class="page-title">健康日誌</div>
            <div class="nav-btn"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></div>
        </div>
    </div>

    <div class="main-container">
        <div class="health-card" onclick="openDrawer('血壓')">
            <div class="card-header">
                <div class="card-title"><svg class="card-icon" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg> 血壓脈搏</div>
                <div style="font-size: 0.8rem; color: var(--text-light);" id="card-bp-tag">晨間紀錄</div>
            </div>
            <div class="value-display">
                <div class="main-value" id="card-bp-sys">--</div>
                <div class="sub-value">/ <span id="card-bp-dia">--</span> mmHg</div>
            </div>
            <div class="action-hint" id="card-bp-hint"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> 點擊輸入今日數據</div>
        </div>

        <div class="health-card" onclick="openDrawer('血糖')">
            <div class="card-header">
                <div class="card-title"><svg class="card-icon" viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg> 血糖觀測</div>
                <div style="font-size: 0.8rem; background: rgba(130,150,140,0.1); padding: 2px 8px; border-radius: 10px; color: var(--accent-jade);" id="card-bs-tag">空腹</div>
            </div>
            <div class="value-display">
                <div class="main-value" id="card-bs-val">--</div>
                <div class="sub-value">mg/dL</div>
            </div>
            <div class="action-hint" id="card-bs-hint"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> 點擊輸入今日數據</div>
        </div>

        <div class="health-card" onclick="openDrawer('體重')">
            <div class="card-header">
                <div class="card-title"><svg class="card-icon" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg> 形體觀照</div>
                <div style="font-size: 0.8rem; color: var(--text-light);" id="card-bmi-val">BMI: --</div>
            </div>
            <div class="value-display">
                <div class="main-value" id="card-wt-val">--</div>
                <div class="sub-value">kg</div>
            </div>
        </div>
    </div>

    <div id="action-drawer" class="bottom-drawer">
        <div class="drawer-handle" onclick="closeDrawer()"></div>
        <div class="drawer-content">
            <div class="drawer-header">
                <div style="width:24px;"></div>
                <div class="drawer-title" id="drawer-title">觀測項目</div>
                <svg onclick="closeDrawer()" style="width:24px; height:24px; stroke:var(--text-light); cursor:pointer;" viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>

            <div class="sub-tags-wrapper" id="drawer-tags"></div>

            <div class="input-display-area" id="drawer-input-area">
                </div>
            
            <div class="medical-hint" id="medical-hint">請輸入數值</div>

            <div class="key-grid">
                <div class="key" onclick="inputChar('1')">1</div>
                <div class="key" onclick="inputChar('2')">2</div>
                <div class="key" onclick="inputChar('3')">3</div>
                <div class="key" onclick="inputChar('4')">4</div>
                <div class="key" onclick="inputChar('5')">5</div>
                <div class="key" onclick="inputChar('6')">6</div>
                <div class="key" onclick="inputChar('7')">7</div>
                <div class="key" onclick="inputChar('8')">8</div>
                <div class="key" onclick="inputChar('9')">9</div>
                <div class="key key-ac" onclick="clearInput()">AC</div>
                <div class="key" onclick="inputChar('0')">0</div>
                <div class="key" onclick="inputChar('.')">.</div>
                <div class="key key-submit" onclick="submitData()">寫入觀照</div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = ""; 
        let currentTag = "";
        let inputData = { sys: "0", dia: "0", single: "0" };
        let activeInput = "single"; // 'sys', 'dia', or 'single'
        const userHeightCm = 170; // 預設身高，未來可於設定中調整

        const tagsDef = {
            '血壓': ['早晨', '晚間'],
            '血糖': ['空腹', '飯後2H', '隨機'],
            '體重': []
        };

        function openDrawer(mode) {
            currentMode = mode;
            document.getElementById('drawer-title').innerText = mode + '紀錄';
            
            // 建立情境標籤
            const tagsBox = document.getElementById('drawer-tags');
            tagsBox.innerHTML = '';
            if (tagsDef[mode].length > 0) {
                currentTag = tagsDef[mode][0];
                tagsDef[mode].forEach(tag => {
                    let el = document.createElement('div');
                    el.className = `sub-tag ${tag === currentTag ? 'selected' : ''}`;
                    el.innerText = tag;
                    el.onclick = () => selectTag(tag, el);
                    tagsBox.appendChild(el);
                });
            }

            // 建立輸入區 UI
            const inputArea = document.getElementById('drawer-input-area');
            if (mode === '血壓') {
                inputData.sys = "0"; inputData.dia = "0"; activeInput = "sys";
                inputArea.innerHTML = `
                    <div class="bp-input-group">
                        <div class="input-box active" id="in-sys" onclick="setActiveInput('sys')">0</div>
                        <div class="input-slash">/</div>
                        <div class="input-box" id="in-dia" onclick="setActiveInput('dia')">0</div>
                    </div>
                    <div class="input-unit">mmHg</div>
                `;
            } else {
                inputData.single = "0"; activeInput = "single";
                let unit = mode === '血糖' ? 'mg/dL' : 'kg';
                inputArea.innerHTML = `
                    <div class="input-box active" id="in-single">0</div>
                    <div class="input-unit">${unit}</div>
                `;
            }

            checkMedicalLogic();
            document.getElementById('action-drawer').classList.add('open');
        }

        function closeDrawer() { document.getElementById('action-drawer').classList.remove('open'); }

        function selectTag(tag, el) {
            currentTag = tag;
            Array.from(el.parentNode.children).forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            checkMedicalLogic();
        }

        function setActiveInput(target) {
            activeInput = target;
            document.getElementById('in-sys').classList.remove('active');
            document.getElementById('in-dia').classList.remove('active');
            document.getElementById('in-' + target).classList.add('active');
        }

        function inputChar(char) {
            let val = inputData[activeInput];
            if (val === "0" && char !== ".") val = char;
            else if (char === "." && val.includes(".")) return;
            else if (val.length < 5) val += char;
            
            inputData[activeInput] = val;
            document.getElementById('in-' + activeInput).innerText = val;
            
            // 血壓輸入時的自動跳轉防呆
            if (currentMode === '血壓' && activeInput === 'sys' && val.length >= 3) {
                setTimeout(() => setActiveInput('dia'), 200);
            }
            
            checkMedicalLogic();
        }

        function clearInput() {
            inputData[activeInput] = "0";
            document.getElementById('in-' + activeInput).innerText = "0";
            checkMedicalLogic();
        }

        // --- 核心醫學觀照邏輯 ---
        function checkMedicalLogic() {
            const hint = document.getElementById('medical-hint');
            hint.className = 'medical-hint'; 
            
            if (currentMode === '血壓') {
                let sys = parseInt(inputData.sys) || 0;
                let dia = parseInt(inputData.dia) || 0;
                let sysBox = document.getElementById('in-sys');
                let diaBox = document.getElementById('in-dia');
                
                sysBox.classList.remove('warning'); diaBox.classList.remove('warning');
                
                if (sys === 0 && dia === 0) { hint.innerText = "標準參考: < 120 / 80"; return; }
                
                let isWarning = false;
                if (sys > 120) { sysBox.classList.add('warning'); isWarning = true; }
                if (dia > 80) { diaBox.classList.add('warning'); isWarning = true; }
                
                if (isWarning) {
                    hint.innerText = "數值偏高，請留意飲食作息，放鬆身心。";
                    hint.classList.add('warning');
                } else {
                    hint.innerText = "血壓平穩，保持清淨心。";
                }
            } 
            else if (currentMode === '血糖') {
                let val = parseInt(inputData.single) || 0;
                let box = document.getElementById('in-single');
                box.classList.remove('warning');
                
                if (val === 0) {
                    hint.innerText = currentTag === '空腹' ? "標準參考: < 100 mg/dL" : "標準參考: < 140 mg/dL";
                    return;
                }
                
                let limit = currentTag === '空腹' ? 100 : 140;
                if (val > limit) {
                    box.classList.add('warning');
                    hint.innerText = `${currentTag}血糖偏高，請控制糖分攝取。`;
                    hint.classList.add('warning');
                } else {
                    hint.innerText = "血糖穩定，狀態良好。";
                }
            }
            else if (currentMode === '體重') {
                let val = parseFloat(inputData.single) || 0;
                if (val === 0) { hint.innerText = `參考身高: ${userHeightCm} cm (可於設定更改)`; return; }
                
                let m = userHeightCm / 100;
                let bmi = (val / (m * m)).toFixed(1);
                
                if (bmi < 18.5) { hint.innerText = `BMI: ${bmi} (過輕) - 請補充營養。`; hint.style.color = 'var(--accent-gold)'; }
                else if (bmi >= 24) { hint.innerText = `BMI: ${bmi} (過重) - 請留意形體觀照。`; hint.classList.add('warning'); }
                else { hint.innerText = `BMI: ${bmi} (標準) - 體態勻稱，繼續保持。`; }
            }
        }

        // --- 寫入卡片 ---
        function submitData() {
            if (currentMode === '血壓') {
                let sys = parseInt(inputData.sys); let dia = parseInt(inputData.dia);
                if(sys > 0 || dia > 0) {
                    document.getElementById('card-bp-sys').innerText = sys || '--';
                    document.getElementById('card-bp-dia').innerText = dia || '--';
                    document.getElementById('card-bp-tag').innerText = currentTag;
                    let mainColor = (sys > 120 || dia > 80) ? 'var(--accent-red)' : 'var(--text-main)';
                    document.getElementById('card-bp-sys').style.color = mainColor;
                }
            } else if (currentMode === '血糖') {
                let val = parseInt(inputData.single);
                if(val > 0) {
                    document.getElementById('card-bs-val').innerText = val;
                    document.getElementById('card-bs-tag').innerText = currentTag;
                    let limit = currentTag === '空腹' ? 100 : 140;
                    document.getElementById('card-bs-val').style.color = val > limit ? 'var(--accent-red)' : 'var(--text-main)';
                }
            } else if (currentMode === '體重') {
                let val = parseFloat(inputData.single);
                if(val > 0) {
                    document.getElementById('card-wt-val').innerText = val;
                    let bmi = (val / Math.pow(userHeightCm/100, 2)).toFixed(1);
                    document.getElementById('card-bmi-val').innerText = `BMI: ${bmi}`;
                }
            }
            closeDrawer();
        }
    </script>
</body>
</html>
