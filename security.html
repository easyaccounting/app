<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>淨息流 ． 金剛藏</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
            --glass-bg: rgba(255, 255, 255, 0.65); --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #58504A; --text-light: #968E86;
            --accent-amber: #C1A583; --accent-amber-light: rgba(193, 165, 131, 0.15);
            --accent-gold: #CBA37A; --accent-jade: #82968C; --accent-red: #D29498;
            --shadow-soft: 0 10px 40px rgba(193, 165, 131, 0.12);
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-gradient); color: var(--text-main); font-family: -apple-system, sans-serif; overflow-x: hidden; -webkit-user-select: none; user-select: none; }

        /* --- 頂部導航 --- */
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 800; padding: max(15px, env(safe-area-inset-top)) 20px 10px; display: flex; flex-direction: column; align-items: center; background: rgba(253,253,253,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.5); }
        .nav-content { width: 100%; max-width: 720px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-btn { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 50%; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); cursor: pointer; transition: all 0.2s; }
        .nav-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
        .page-title { font-size: 1.15rem; font-weight: 500; letter-spacing: 3px; color: var(--accent-amber); }

        .module-tabs { width: 100%; max-width: 720px; display: flex; justify-content: center; gap: 15px; padding-bottom: 5px; }
        .mod-tab { padding: 8px 25px; border-radius: 20px; font-size: 0.95rem; font-weight: 500; color: var(--text-light); border: 1px solid transparent; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .mod-tab svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
        .mod-tab.active { background: var(--glass-bg); color: var(--accent-amber); border-color: var(--accent-amber); box-shadow: 0 4px 15px var(--accent-amber-light); }

        /* --- 主要內容區 --- */
        .main-container { width: 100%; max-width: 720px; margin: 0 auto; padding: calc(130px + env(safe-area-inset-top)) 20px 100px; display: none; flex-direction: column; gap: 20px; animation: fadeIn 0.4s ease; }
        .main-container.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .health-card { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 22px; box-shadow: var(--shadow-soft); display: flex; flex-direction: column; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .card-title { display: flex; align-items: center; gap: 10px; font-size: 1.05rem; font-weight: 500; color: var(--text-main); }
        .card-icon { width: 22px; height: 22px; stroke: var(--accent-amber); fill: none; stroke-width: 1.8; }
        
        .styled-input { flex: 1; background: rgba(255,255,255,0.6); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px 15px; font-size: 16px; color: var(--text-main); font-family: inherit; margin-bottom: 10px; width: 100%; outline: none; }
        .styled-input:focus { border-color: var(--accent-amber); background: rgba(255,255,255,0.9); }
        
        .vault-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 15px; background: rgba(255,255,255,0.4); border: 1px solid var(--glass-border); border-radius: 16px; margin-bottom: 10px; }
        .vault-info { display: flex; flex-direction: column; gap: 4px; }
        .vault-name { font-size: 0.95rem; color: var(--text-main); font-weight: 500; }
        .vault-date { font-size: 0.75rem; color: var(--text-light); }
        
        .btn-sm { padding: 6px 12px; border-radius: 10px; font-size: 0.8rem; border: 1px solid var(--accent-amber); color: var(--accent-amber); background: transparent; cursor: pointer; }
        .vax-divider { font-size: 0.8rem; color: var(--accent-amber); font-weight: 500; margin: 10px 0 10px 5px; display: flex; align-items: center; gap: 8px; }
        .vax-divider::after { content: ''; flex: 1; height: 1px; background: rgba(193, 165, 131, 0.3); }

        .key-submit { width: 100%; background: var(--accent-amber); color: white; border: none; padding: 15px; border-radius: 20px; font-size: 1.1rem; cursor: pointer; margin-top: 10px; box-shadow: var(--shadow-soft); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 3000; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .glass-modal { background: rgba(253, 252, 252, 0.95); width: 85%; max-width: 320px; border-radius: 25px; padding: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.15); border: 1px solid var(--glass-border); text-align: center; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-content">
            <div class="nav-btn" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></div>
            <div class="page-title">金剛藏 ． 數位密室</div>
            <div style="width: 42px;"></div>
        </div>
        <div class="module-tabs">
            <div class="mod-tab active" id="tab-vault" onclick="switchStage('vault')"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> 秘密封存</div>
            <div class="mod-tab" id="tab-brick" onclick="switchStage('brick')"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline></svg> 加密金磚</div>
        </div>
    </div>

    <div class="main-container active" id="view-vault">
        <div class="health-card" style="background: var(--accent-amber-light); border: 1px solid var(--accent-amber);">
            <div class="card-header"><div class="card-title"><svg class="card-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> 數位密室守則</div></div>
            <div style="font-size: 0.85rem; line-height: 1.6;">本密室不儲存金鑰，遺忘密碼將無法還原內容。建議使用「遺囑、筆記、備份」分類管理。</div>
        </div>

        <div class="health-card">
            <div class="card-header"><div class="card-title">封存紀錄</div></div>
            <select id="v-cat" class="styled-input">
                <option value="數位遺囑">數位遺囑</option>
                <option value="靈魂筆記">靈魂筆記</option>
                <option value="帳戶備份">帳戶備份</option>
            </select>
            <input type="text" id="v-title" class="styled-input" placeholder="標題">
            <input type="password" id="v-key" class="styled-input" placeholder="設定解鎖金鑰">
            <textarea id="v-content" class="styled-input" rows="3" placeholder="需要保密的內容" style="resize:none;"></textarea>
            <button class="key-submit" onclick="actionEncrypt()">存入密室</button>
        </div>
        <div id="vault-list-area"></div>
    </div>

    <div class="main-container" id="view-brick">
        <div class="health-card">
            <div class="card-header"><div class="card-title">打包金磚</div></div>
            <div style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 20px;">將四大模組資料以「總金鑰」二次加密，生成防護金磚。</div>
            <button class="key-submit" style="background:var(--accent-gold);" onclick="exportEncryptedBrick()">生成加密金磚 (.json)</button>
        </div>

        <div class="health-card" style="margin-top: 10px; border: 1px dashed var(--accent-jade);">
            <div class="card-header"><div class="card-title">還原金磚</div></div>
            <div style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 20px;">選取備份檔並輸入總金鑰，系統將解碼並同步數據。</div>
            <input type="file" id="import-file" style="display:none;" onchange="importEncryptedBrick(event)">
            <button class="key-submit" style="background:var(--accent-jade);" onclick="document.getElementById('import-file').click()">選取並解碼還原</button>
        </div>
    </div>

    <div class="modal-overlay" id="decrypt-modal">
        <div class="glass-modal">
            <h3 style="margin-top:0; color:var(--text-main);">驗證金鑰</h3>
            <input type="password" id="d-key" class="styled-input" placeholder="輸入解鎖鑰匙" style="text-align:center;">
            <div id="d-result" style="display:none; padding:15px; background:white; border-radius:12px; margin:10px 0; border:1px dashed var(--accent-amber); word-break:break-all; font-size:0.9rem;"></div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-sm" style="flex:1;" onclick="document.getElementById('decrypt-modal').classList.remove('show')">關閉</button>
                <button class="btn-sm" style="flex:1; background:var(--accent-amber); color:white;" id="btn-do-decrypt">確認解鎖</button>
            </div>
        </div>
    </div>

    <script>
        const encoder = new TextEncoder(), decoder = new TextDecoder();
        const DB_KEY = 'joy_security_data';
        let secDB = JSON.parse(localStorage.getItem(DB_KEY)) || { entries: [] };

        async function deriveKey(password, salt) {
            const baseKey = await window.crypto.subtle.importKey('raw', encoder.encode(password), 'PBKDF2', false, ['deriveKey']);
            return window.crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 600000, hash: 'SHA-256' }, baseKey, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
        }

        async function encryptData(password, text) {
            const salt = window.crypto.getRandomValues(new Uint8Array(16)), iv = window.crypto.getRandomValues(new Uint8Array(12));
            const key = await deriveKey(password, salt);
            const encrypted = await window.crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoder.encode(text));
            const result = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
            result.set(salt, 0); result.set(iv, 16); result.set(new Uint8Array(encrypted), 28);
            return btoa(String.fromCharCode(...result));
        }

        async function decryptData(password, b64) {
            const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
            const key = await deriveKey(password, raw.slice(0, 16));
            const decrypted = await window.crypto.subtle.decrypt({ name: 'AES-GCM', iv: raw.slice(16, 28) }, key, raw.slice(28));
            return decoder.decode(decrypted);
        }

        function switchStage(stage) {
            document.querySelectorAll('.main-container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.mod-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('view-' + stage).classList.add('active');
            document.getElementById('tab-' + stage).classList.add('active');
        }

        async function actionEncrypt() {
            const cat = document.getElementById('v-cat').value, title = document.getElementById('v-title').value.trim(), key = document.getElementById('v-key').value, content = document.getElementById('v-content').value.trim();
            if(!title || !key || !content) return alert('資訊不全');
            try {
                const encrypted = await encryptData(key, content);
                secDB.entries.push({ id: Date.now(), category: cat, title, data: encrypted, date: new Date().toLocaleDateString() });
                localStorage.setItem(DB_KEY, JSON.stringify(secDB));
                renderVault();
                document.getElementById('v-title').value = ''; document.getElementById('v-key').value = ''; document.getElementById('v-content').value = '';
            } catch(e) { alert('失敗'); }
        }

        function renderVault() {
            const area = document.getElementById('vault-list-area'), cats = ["數位遺囑", "靈魂筆記", "帳戶備份"];
            let html = '';
            cats.forEach(c => {
                const items = secDB.entries.filter(i => i.category === c);
                if(items.length > 0) {
                    html += `<div class="vax-divider">${c}</div>`;
                    items.forEach(item => {
                        html += `<div class="vault-item"><div class="vault-info"><div class="vault-name">${item.title}</div><div class="vault-date">${item.date}</div></div><div style="display:flex; gap:8px;"><button class="btn-sm" onclick="openDecrypt(${item.id})">解鎖</button><button class="btn-sm" style="border-color:var(--accent-red); color:var(--accent-red);" onclick="deleteItem(${item.id})">刪除</button></div></div>`;
                    });
                }
            });
            area.innerHTML = html || '<div style="text-align:center; color:var(--text-light); padding:20px;">尚無紀錄</div>';
        }

        let currentId = null;
        function openDecrypt(id) {
            currentId = id; document.getElementById('d-result').style.display = 'none'; document.getElementById('d-key').value = '';
            document.getElementById('decrypt-modal').classList.add('show');
            document.getElementById('btn-do-decrypt').onclick = async () => {
                const key = document.getElementById('d-key').value, item = secDB.entries.find(i => i.id === currentId), resEl = document.getElementById('d-result');
                try { resEl.innerText = await decryptData(key, item.data); resEl.style.display = 'block'; resEl.style.color = 'var(--text-main)'; } 
                catch(e) { resEl.innerText = '金鑰錯誤'; resEl.style.display = 'block'; resEl.style.color = 'var(--accent-red)'; }
            };
        }

        async function exportEncryptedBrick() {
            const key = prompt("設定金磚總金鑰："); if(!key) return;
            const fullData = { accounting: localStorage.getItem('joy_accounting_app_data'), health: localStorage.getItem('joy_health_history'), mom: localStorage.getItem('joy_mom_data'), pet: localStorage.getItem('joy_pet_data'), security: localStorage.getItem(DB_KEY) };
            const encrypted = await encryptData(key, JSON.stringify(fullData));
            const blob = new Blob([JSON.stringify({ type: "VAJRA_BRICK", payload: encrypted })], { type: 'application/json' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `Joy_Vajra_Brick.json`; link.click();
        }

        async function importEncryptedBrick(event) {
            const file = event.target.files[0]; if (!file) return;
            const key = prompt("輸入總金鑰解鎖："); if (!key) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    const decryptedStr = await decryptData(key, json.payload);
                    const data = JSON.parse(decryptedStr);
                    if(data.accounting) localStorage.setItem('joy_accounting_app_data', data.accounting);
                    if(data.health) localStorage.setItem('joy_health_history', data.health);
                    if(data.mom) localStorage.setItem('joy_mom_data', data.mom);
                    if(data.pet) localStorage.setItem('joy_pet_data', data.pet);
                    if(data.security) localStorage.setItem(DB_KEY, data.security);
                    alert("還原成功！"); location.reload();
                } catch (err) { alert("解碼失敗"); }
            };
            reader.readAsText(file);
        }

        function deleteItem(id) { if(confirm('確定刪除？')) { secDB.entries = secDB.entries.filter(i => i.id !== id); localStorage.setItem(DB_KEY, JSON.stringify(secDB)); renderVault(); } }
        window.onload = renderVault;
    </script>
</body>
</html>
