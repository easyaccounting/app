<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智力流速儀 - 算力透明監控</title>
    <style>
        :root {
            --bg-color: #f4f7f6; /* 莫蘭迪灰白 */
            --primary-orange: #e67e22;
            --primary-blue: #3498db;
            --text-color: #2c3e50;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        /* 智靈 - 方塊火材人 SVG 樣式 */
        #compute-spirit {
            width: 200px;
            height: 250px;
            margin: 20px auto;
            transition: all 0.3s ease;
        }

        .stickman-head { fill: #fff; stroke: var(--text-color); stroke-width: 2; }
        .stickman-line { fill: none; stroke: var(--text-color); stroke-width: 2; stroke-linecap: round; }
        
        /* 動態動作定義 */
        @keyframes vibrate {
            0% { transform: translate(0,0); }
            25% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            100% { transform: translate(0,0); }
        }

        .running { animation: vibrate 0.1s infinite; fill: var(--primary-orange) !important; }
        .cooling { fill: var(--primary-blue) !important; opacity: 0.7; }

        /* UI 元件 */
        .dashboard {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box { border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--primary-orange); }

        textarea {
            width: 100%;
            height: 80px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            background-color: var(--text-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        .raw-json {
            text-align: left;
            background: #272822;
            color: #f8f8f2;
            padding: 10px;
            font-size: 0.8rem;
            border-radius: 5px;
            overflow-x: auto;
            max-height: 150px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>智力流速儀 <small style="font-weight: normal; opacity: 0.6;">v1.0 Beta</small></h2>
    
    <svg id="compute-spirit" viewBox="0 0 100 130">
        <line x1="50" y1="70" x2="50" y2="100" class="stickman-line" />
        <line x1="50" y1="80" x2="30" y2="90" class="stickman-line" id="l-arm" />
        <line x1="50" y1="80" x2="70" y2="90" class="stickman-line" id="r-arm" />
        <line x1="50" y1="100" x2="35" y2="120" class="stickman-line" id="l-leg" />
        <line x1="50" y1="100" x2="65" y2="120" class="stickman-line" id="r-leg" />
        
        <rect x="20" y="10" width="60" height="60" class="stickman-head" id="head-box" />
        
        <circle cx="40" cy="35" r="3" fill="#2c3e50" /> <circle cx="60" cy="35" r="3" fill="#2c3e50" /> <line x1="50" y1="40" x2="50" y2="50" class="stickman-line" style="stroke-width:1.5" /> <line x1="40" y1="58" x2="60" y2="58" class="stickman-line" id="mouth-line" /> </svg>

    <div class="dashboard">
        <textarea id="api-key" placeholder="在此貼入您的 Gemini API Key (僅存於本地瀏覽器)"></textarea>
        <button onclick="runTest()">開始跑分測試</button>

        <div class="stats-grid">
            <div class="stat-box">
                <div>即時流速 (TPS)</div>
                <div id="tps-val" class="stat-value">0.0</div>
            </div>
            <div class="stat-box">
                <div>首字延遲 (TTFT)</div>
                <div id="ttft-val" class="stat-value">0ms</div>
            </div>
        </div>
        
        <div>透明化算力指標 (SCU): <span id="scu-val" style="font-weight:bold;">0</span></div>
    </div>

    <div class="raw-json" id="json-viewer">// Raw JSON 數據攔截視窗...</div>
</div>

<script>
    const spiritHead = document.getElementById('head-box');
    const mouthLine = document.getElementById('mouth-line');

    async function runTest() {
        const apiKey = document.getElementById('api-key').value;
        if(!apiKey) return alert("請先輸入 API Key");

        // 視覺切換：奔跑狀態
        spiritHead.classList.add('running');
        document.getElementById('json-viewer').innerText = "正在連線智力源泉...";
        
        const startTime = performance.now();
        let firstTokenTime = null;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:streamGenerateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "請進行標準邏輯跑分測試，產出約300字關於智慧價值的論述。" }] }]
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let totalTokens = 0;
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                if (!firstTokenTime) {
                    firstTokenTime = performance.now();
                    document.getElementById('ttft-val').innerText = `${Math.round(firstTokenTime - startTime)}ms`;
                }

                const chunk = decoder.decode(value);
                fullText += chunk;
                // 模擬 Token 計算 (粗略估計：中文 1 字約 1-1.5 token)
                totalTokens = fullText.length * 1.2; 
                
                const currentTime = performance.now();
                const tps = (totalTokens / ((currentTime - startTime) / 1000)).toFixed(1);
                document.getElementById('tps-val').innerText = tps;
                
                // 顯示 Raw JSON 片段 (模擬攔截)
                document.getElementById('json-viewer').innerText = chunk.substring(0, 200) + "...";
            }

            // 測試結束
            spiritHead.classList.remove('running');
            const finalTime = (performance.now() - startTime) / 1000;
            const finalSCU = Math.round((totalTokens / finalTime) * 10);
            document.getElementById('scu-val').innerText = finalSCU;
            
            // 表情變化：笑
            mouthLine.setAttribute('x1', '35');
            mouthLine.setAttribute('x2', '65');
            mouthLine.style.stroke = "green";

        } catch (error) {
            spiritHead.classList.remove('running');
            spiritHead.classList.add('cooling');
            document.getElementById('json-viewer').innerText = "測試失敗：大廠可能正在冷卻妳。";
        }
    }
</script>

</body>
</html>
