<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#d4af37">
    <title>Amitabha Pure Land & Ledger System</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        :root { --bg: #000; --gold: #f3e5ab; --solid-gold: #d4af37; --cyan: #8ba89c; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; padding-bottom: 80px; }
        .container { width: 92%; max-width: 450px; display: none; flex-direction: column; align-items: center; padding: 20px 0; }
        .active { display: flex; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .btn-main { width: 100%; background: linear-gradient(145deg, #222, #000); color: var(--gold); border: 1.5px solid var(--gold); padding: 18px; border-radius: 35px; font-weight: bold; margin: 10px 0; cursor: pointer; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.6); }
        .btn-main:active { transform: scale(0.98); background: var(--gold); color: #000; }
        .ledger-card { width: 100%; background: var(--glass); border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        #scanner-viewport { width: 100%; aspect-ratio: 1/1; background: #111; border: 1px solid var(--gold); border-radius: 20px; overflow: hidden; position: relative; }
        #preview-video { width: 100%; height: 100%; object-fit: cover; }
        #scan-canvas { display: none; } /* 隱藏的計算用畫布 */
        .scan-laser { position: absolute; width: 100%; height: 2px; background: var(--gold); top: 0; left: 0; animation: laser 3s infinite linear; box-shadow: 0 0 15px var(--gold); }
        @keyframes laser { 0% { top: 0% } 100% { top: 100% } }
        .time-monitor { width: 94%; max-width: 450px; margin: 15px auto; padding: 12px 15px; background: var(--glass); backdrop-filter: blur(20px); border: 1.5px solid var(--gold); border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="time-monitor">
    <div style="display:flex; align-items:center; gap:10px;">
        <div style="width:30px; height:30px; border:1px solid var(--gold); border-radius:50%; display:flex; justify-content:center; align-items:center; color:var(--gold); font-size:0.6rem;">卍</div>
        <div style="font-size:0.8rem; color:var(--gold); font-weight:bold;">Miaoyi Ledger</div>
    </div>
    <div id="earth-time" style="font-size:0.7rem; color:#888;">--:--:--</div>
</div>

<div id="screen-1" class="container active">
    <div style="width:100%; border: 1.5px solid var(--gold); border-radius: 18px; margin: 20px 0; background: rgba(243,229,171,0.03); padding: 20px; text-align:center;">
        <div style="font-size:0.8rem; color:#888;">Provision Balance</div>
        <div id="total-balance" style="font-size:2.5rem; color:var(--gold); font-weight:bold;">$ 0.00</div>
    </div>

    <button class="btn-main" onclick="openScannerPortal()">
        SCAN TAIWAN INVOICE (Left QR)
    </button>

    <div id="history-list" style="width:100%; margin-top:20px;">
        <p style="text-align:center; color:#444; font-size:0.8rem;">No records</p>
    </div>
</div>

<div id="scanner-modal" class="modal">
    <div style="width:100%; max-width:400px; text-align:center;">
        <h3 style="color:var(--gold); margin-bottom:10px;">INVOICE SCANNER</h3>
        <div id="scanner-viewport">
            <video id="preview-video" playsinline></video>
            <canvas id="scan-canvas"></canvas>
            <div class="scan-laser"></div>
        </div>
        <p id="scan-status" style="color:var(--cyan); font-size:0.85rem; margin:20px 0; font-weight:bold;">Initializing Universal Engine...</p>
        <button class="btn-main" style="background:#222 !important; border-color:#444;" onclick="closeScanner()">CANCEL</button>
    </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('PX_EN_V15.0')) || { ledger: [] };
function save() { localStorage.setItem('PX_EN_V15.0', JSON.stringify(db)); }

function updateUI() {
    const total = db.ledger.reduce((sum, item) => sum + item.amount, 0);
    document.getElementById('total-balance').innerText = `$ ${total.toLocaleString()}`;
    const list = document.getElementById('history-list');
    if (db.ledger.length === 0) {
        list.innerHTML = '<p style="text-align:center; color:#444; font-size:0.8rem;">No records</p>';
    } else {
        list.innerHTML = db.ledger.slice().reverse().map(item => `
            <div class="ledger-card">
                <div><div style="color:var(--gold); font-weight:bold;">${item.title}</div><div style="color:#666; font-size:0.7rem;">${item.date}</div></div>
                <div style="color:var(--cyan);">$ ${item.amount}</div>
            </div>
        `).join('');
    }
}

const InvoiceParser = {
    parse: function(qrStr) {
        if (qrStr.length < 50) return null;
        try {
            const amountHex = qrStr.substring(29, 37);
            const amount = parseInt(amountHex, 16);
            const year = parseInt(qrStr.substring(10, 13)) + 1911;
            const month = qrStr.substring(13, 15);
            const day = qrStr.substring(15, 17);
            if (isNaN(amount) || amount === 0) return null;
            return { title: "Receipt: " + qrStr.substring(0, 10), amount: amount, date: `${year}-${month}-${day}` };
        } catch(e) { return null; }
    }
};

let scanActive = false;
let videoStream = null;

async function openScannerPortal() {
    document.getElementById('scanner-modal').style.display = 'flex';
    const video = document.getElementById('preview-video');
    const status = document.getElementById('scan-status');
    const canvas = document.getElementById('scan-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = videoStream;
        video.setAttribute("playsinline", true); 
        await video.play();
        scanActive = true;
        status.innerText = "Align LEFT QR Code";

        // ✨ 雙引擎掃描邏輯 ✨
        const tick = () => {
            if (!scanActive) return;
            
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // 引擎 A: 嘗試原生 BarcodeDetector (如果支援)
                if ('BarcodeDetector' in window) {
                    const detector = new BarcodeDetector({ formats: ['qr_code'] });
                    detector.detect(video).then(barcodes => {
                        if (barcodes.length > 0) handleResult(barcodes[0].rawValue);
                        else fallbackScan();
                    }).catch(() => fallbackScan());
                } else {
                    fallbackScan();
                }
            } else {
                requestAnimationFrame(tick);
            }
        };

        // 引擎 B: 萬用 jsQR 畫布解析
        const fallbackScan = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
            
            if (code) {
                handleResult(code.data);
            } else {
                requestAnimationFrame(tick);
            }
        };

        const handleResult = (raw) => {
            console.log("Raw Data:", raw);
            const result = InvoiceParser.parse(raw);
            if (result) {
                db.ledger.push(result);
                save(); updateUI();
                if (navigator.vibrate) navigator.vibrate(50);
                alert("Success: Registered $" + result.amount);
                closeScanner();
            } else {
                status.innerText = "Non-standard QR. Try the LEFT one.";
                status.style.color = "#ff8b94";
                setTimeout(() => { if(scanActive) { status.innerText = "Align LEFT QR Code"; status.style.color = "var(--cyan)"; tick(); } }, 1500);
            }
        };

        tick();
    } catch(err) {
        status.innerText = "Camera Access Denied or Browser Conflict.";
    }
}

function closeScanner() {
    scanActive = false;
    if (videoStream) videoStream.getTracks().forEach(t => t.stop());
    document.getElementById('scanner-modal').style.display = 'none';
}

window.onload = () => {
    updateUI();
    setInterval(() => { document.getElementById('earth-time').innerText = new Date().toLocaleTimeString(); }, 1000);
};
</script>
</body>
</html>
