<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <title>淨息流 ． 財務記帳</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #F9FAF9, #E6EBE9);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.9);
            --glass-shadow: 0 10px 40px rgba(160, 155, 150, 0.12);
            --text-main: #58504A; --text-light: #968E86;
            --accent-gold: #CBA37A; --accent-jade: #82968C; --accent-red: #D29498;
            --cat-food: #D9AEAD; --cat-trans: #B5AFA6; --cat-house: #CBA37A;
            --cat-ent: #9BAA9D; --cat-beauty: #D3A9A7; --cat-other: #C2BAC6;
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-gradient); color: var(--text-main); 
            font-family: -apple-system, sans-serif; overflow-x: hidden; -webkit-user-select: none; user-select: none; 
        }

        /* --- 頂部導航 --- */
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 800; padding: max(15px, env(safe-area-inset-top)) 20px 15px; display: flex; justify-content: center; background: linear-gradient(to bottom, rgba(249,250,249,0.95), rgba(249,250,249,0)); }
        .nav-content { width: 100%; max-width: 720px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--glass-shadow); cursor: pointer; }
        .page-title { font-size: 1.1rem; font-weight: 500; letter-spacing: 2px; color: var(--accent-gold); }

        /* --- 主容器與今日微觀重構 --- */
        .main-container { width: 100%; max-width: 720px; margin: 0 auto; padding: calc(80px + env(safe-area-inset-top)) 20px 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .balance-section { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .balance-amount { font-size: 3.5rem; font-weight: 300; color: var(--accent-gold); }

        /* 拉長今日列表區域 */
        .today-section { width: 100%; display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .today-list { 
            max-height: 40vh; /* 自動適應各種手機高度 */
            overflow-y: auto; display: flex; flex-direction: column; gap: 8px; scrollbar-width: none; 
        }
        .today-list::-webkit-scrollbar { display: none; }
        
        .t-item { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 18px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .t-item:active { background: rgba(255,255,255,0.95); transform: scale(0.98); }

        /* --- 分類按鈕纖薄化 --- */
        .category-grid { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 5px; }
        .cat-btn { 
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 18px; 
            padding: 10px 5px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;
        }
        .cat-btn svg { width: 22px; height: 22px; stroke: var(--text-main); fill: none; stroke-width: 1.5; }
        .cat-btn span { font-size: 0.7rem; color: var(--text-main); font-weight: 500; }
        .cat-btn.active { border-color: var(--accent-gold); background: #fff; }

        /* --- 掃描與編輯視窗 --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 3000; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .glass-modal { background: rgba(252, 251, 249, 0.95); width: 100%; max-width: 360px; border-radius: 30px; padding: 25px; border: 1px solid #fff; }

        /* 掃描專屬引導 */
        .scan-guide { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .step-pill { font-size: 0.7rem; padding: 4px 12px; border-radius: 20px; border: 1px solid #ddd; color: #999; }
        .step-pill.active { border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(203, 163, 122, 0.1); }

        /* 數字鍵盤抽屜 */
        .keyboard-panel { position: fixed; bottom: 0; left: 0; width: 100vw; background: rgba(252, 251, 249, 0.98); backdrop-filter: blur(25px); border-top: 1px solid var(--glass-border); border-radius: 30px 30px 0 0; transform: translateY(100%); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 2000; padding: 20px 25px calc(20px + env(safe-area-inset-bottom)); }
        .keyboard-panel.open { transform: translateY(0); }

        /* 側邊選單樣式保留原有... */
        .side-menu { position: fixed; top: 0; left: 0; width: 80%; max-width: 320px; height: 100%; background: #fff; z-index: 901; transform: translateX(-100%); transition: 0.4s; padding: 40px 20px; }
        .side-menu.open { transform: translateX(0); }
        .side-menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 900; display: none; }
        .side-menu-overlay.open { display: block; }
    </style>
</head>
<body>

    <div class="side-menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="side-menu">
        <div style="font-size: 1.5rem; letter-spacing: 3px; margin-bottom: 30px;">淨息流</div>
        <div class="menu-list" style="display: flex; flex-direction: column; gap: 10px;">
            <div class="menu-item" onclick="toggleMenu()" style="color:var(--accent-gold); font-weight:bold;">財務記帳</div>
            <div class="menu-item" onclick="toggleMenu(); openScanner()">
                <svg style="width:16px; margin-right:8px; vertical-align:middle;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2m10 0h2a2 2 0 0 1 2 2v2m0 10v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/></svg>發票掃描記帳
            </div>
            <div class="menu-item" onclick="window.location.href='index.html'">回大廳</div>
        </div>
    </div>

    <div class="top-nav">
        <div class="nav-content">
            <div class="nav-btn" onclick="toggleMenu()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>
            <div class="page-title">財務記帳</div>
            <div class="nav-btn" onclick="openScanner()" style="color:var(--accent-gold)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="balance-section">
            <div style="font-size: 0.8rem; color: var(--text-light); letter-spacing: 2px;">目前結餘</div>
            <div class="balance-amount" id="main-balance">$0</div>
        </div>

        <div class="today-section">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; padding: 0 5px;">
                <div style="font-size: 0.85rem; font-weight: 500;">今日支出 <span id="today-total-amt" style="color:var(--accent-gold); font-size: 1.2rem;">$0</span></div>
                <div style="font-size: 0.75rem; color: var(--text-light);">點擊紀錄可編輯</div>
            </div>
            <div class="today-list" id="today-list">
                </div>
        </div>

        <div class="category-grid">
            <div class="cat-btn" onclick="openKeyboard(this, '飲食')"><svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1z"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg><span>飲食</span></div>
            <div class="cat-btn" onclick="openKeyboard(this, '服飾')"><svg viewBox="0 0 24 24"><path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg><span>服飾</span></div>
            <div class="cat-btn" onclick="openKeyboard(this, '交通')"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="22" height="13" rx="2"/><path d="M4 16v4"/></svg><span>交通</span></div>
            <div class="cat-btn" onclick="openKeyboard(this, '居住')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>居住</span></div>
            <div class="cat-btn" onclick="openKeyboard(this, '育樂')"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2"/></svg><span>育樂</span></div>
            <div class="cat-btn" onclick="openKeyboard(this, '其他')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg><span>其他</span></div>
            
            <button class="btn-main" style="grid-column: span 3; height: 50px; margin: 5px 0;" onclick="openKeyboard(null, '收入', true)">記一筆收入</button>
        </div>
    </div>

    <div class="modal-overlay" id="scan-modal">
        <div class="glass-modal" style="text-align: center;">
            <div style="font-size: 1.1rem; color: var(--accent-gold); margin-bottom: 20px; letter-spacing: 2px;">發票智慧解析</div>
            <div style="width:100%; aspect-ratio:1/1; border-radius:25px; overflow:hidden; position:relative; background:#000;">
                <video id="preview-video" playsinline></video>
                <canvas id="scan-canvas"></canvas>
                <div class="scan-laser"></div>
            </div>
            <div class="scan-guide">
                <div class="step-pill active" id="step-1">1. 掃左側(總額)</div>
                <div class="step-pill" id="step-2">2. 掃右側(明細)</div>
            </div>
            <div id="scan-status" style="margin-top: 15px; font-size: 0.85rem; color: var(--text-light);">請對準發票左方 QR Code</div>
            <button class="btn-main" style="margin-top: 25px; background: #eee !important; color: #666; border: none;" onclick="closeScanner()">取消</button>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="glass-modal">
            <h3 style="margin:0 0 20px; color:var(--text-main); font-weight:500;">修正紀錄</h3>
            <div style="text-align:left; font-size:0.8rem; color:var(--text-light); margin-bottom:5px;">金額</div>
            <input type="number" id="edit-amt" class="modal-input">
            <div style="text-align:left; font-size:0.8rem; color:var(--text-light); margin-bottom:5px;">明細與備註</div>
            <textarea id="edit-memo" class="modal-input" style="height: 100px; text-align: left;"></textarea>
            <div class="modal-btn-group">
                <button class="m-btn m-btn-cancel" onclick="deleteEntry()">刪除</button>
                <button class="m-btn m-btn-confirm" onclick="saveEdit()">儲存</button>
            </div>
            <button class="m-btn" style="margin-top:15px; width:100%; color:var(--text-light);" onclick="document.getElementById('edit-modal').classList.remove('show')">關閉</button>
        </div>
    </div>

    <div class="keyboard-panel" id="keyboard">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div id="kb-cat-name" style="font-weight: bold; color: var(--accent-gold);">飲食</div>
            <div style="font-size: 2.2rem; font-weight: 300;" id="input-amt">0</div>
        </div>
        <input type="text" id="kb-memo" placeholder="輸入備註..." style="width:100%; padding:10px; border:none; background:rgba(0,0,0,0.03); border-radius:10px; margin-bottom:15px; outline:none;">
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
            <button class="key" style="height:55px; border-radius:15px; border:1px solid #eee; background:#fff;" onclick="inputNum(1)">1</button>
            <button class="key" style="height:55px; border-radius:15px; border:1px solid #eee; background:#fff;" onclick="inputNum(2)">2</button>
            <button class="key" style="height:55px; border-radius:15px; border:1px solid #eee; background:#fff;" onclick="inputNum(3)">3</button>
            <button class="key" style="height:55px; border-radius:15px; border:none; background:var(--accent-red); color:#fff;" onclick="clearNum()">AC</button>
            <button class="key" style="height:55px; border-radius:15px; border:1px solid #eee; background:#fff;" onclick="inputNum(4)">4</button>
            <button class="key" style="height:55px; border-radius:15px; border:1px solid #eee; background:#fff;" onclick="inputNum(5)">5</button>
            <button class="key" style="height:55px; border-radius:15px; border:1px solid #eee; background:#fff;" onclick="inputNum(6)">6</button>
            <button class="key" style="grid-row: span 3; border-radius:15px; border:none; background:var(--accent-gold); color:#fff; font-size:1.5rem;" onclick="submitEntry()">✓</button>
            <button class="key" style="height:55px; border-radius:15px; border:1px solid #eee; background:#fff;" onclick="inputNum(7)">7</button>
            <button class="key" style="height:55px; border-radius:15px; border:1px solid #eee; background:#fff;" onclick="inputNum(8)">8</button>
            <button class="key" style="height:55px; border-radius:15px; border:1px solid #eee; background:#fff;" onclick="inputNum(9)">9</button>
            <button class="key" style="height:55px; border-radius:15px; border:none; background:#eee;" onclick="closeKeyboard()">X</button>
            <button class="key" style="grid-column: span 2; border-radius:15px; border:1px solid #eee; background:#fff;" onclick="inputNum(0)">0</button>
        </div>
    </div>

    <script>
        // --- 核心數據 ---
        const STORAGE_KEY = 'joy_ledger_v2_data';
        let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { transactions: [] };
        let currentInput = "0", isIncomeMode = false, activeCat = '飲食', editingId = null;

        const colorMap = { '飲食': 'var(--cat-food)', '服飾': 'var(--cat-beauty)', '居住': 'var(--cat-house)', '交通': 'var(--cat-trans)', '育樂': 'var(--cat-ent)', '其他': 'var(--cat-other)', '收入': 'var(--accent-jade)' };

        window.onload = () => { updateUI(); };

        function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); updateUI(); }

        function toggleMenu() { 
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            const isOpen = menu.classList.contains('open');
            menu.classList.toggle('open', !isOpen);
            overlay.classList.toggle('open', !isOpen);
        }

        function updateUI() {
            let total = appData.transactions.reduce((acc, t) => t.type === 'income' ? acc + t.amt : acc - t.amt, 0);
            document.getElementById('main-balance').innerText = "$" + total.toLocaleString();
            
            const listObj = document.getElementById('today-list');
            const totalObj = document.getElementById('today-total-amt');
            let dailyExpense = 0;
            
            listObj.innerHTML = '';
            if (appData.transactions.length === 0) {
                listObj.innerHTML = '<div style="text-align:center; padding:20px; color:#999; font-size:0.8rem;">尚無紀錄</div>';
            } else {
                appData.transactions.forEach(t => {
                    if(t.type === 'expense') dailyExpense += t.amt;
                    listObj.innerHTML += `
                        <div class="t-item" onclick="openEditModal(${t.id})">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div style="width:10px; height:10px; border-radius:50%; background:${t.color}"></div>
                                <div>
                                    <div style="font-size:0.9rem; font-weight:500;">${t.cat}</div>
                                    <div style="font-size:0.7rem; color:#999; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${t.memo || '無備註'}</div>
                                </div>
                            </div>
                            <div style="font-size:1.1rem; font-weight:500; color:${t.type==='income'?'var(--accent-jade)':'var(--text-main)'}">
                                ${t.type==='income'?'+':'-'}$${t.amt.toLocaleString()}
                            </div>
                        </div>
                    `;
                });
            }
            totalObj.innerText = "$" + dailyExpense.toLocaleString();
        }

        // --- 鍵盤與輸入 ---
        function openKeyboard(btn, cat, isInc = false) {
            activeCat = cat; isIncomeMode = isInc; currentInput = "0";
            document.getElementById('kb-cat-name').innerText = cat;
            document.getElementById('input-amt').innerText = "0";
            document.getElementById('kb-memo').value = "";
            document.getElementById('keyboard').classList.add('open');
        }
        function closeKeyboard() { document.getElementById('keyboard').classList.remove('open'); }
        function inputNum(n) { currentInput = currentInput === "0" ? n.toString() : currentInput + n.toString(); document.getElementById('input-amt').innerText = Number(currentInput).toLocaleString(); }
        function clearNum() { currentInput = "0"; document.getElementById('input-amt').innerText = "0"; }
        function submitEntry() {
            let amt = Number(currentInput);
            if(amt > 0) {
                appData.transactions.unshift({
                    id: Date.now(), type: isIncomeMode ? 'income' : 'expense',
                    cat: activeCat, amt: amt, memo: document.getElementById('kb-memo').value,
                    color: colorMap[activeCat] || 'var(--accent-jade)'
                });
                saveData();
            }
            closeKeyboard();
        }

        // --- 編輯功能 ---
        function openEditModal(id) {
            const t = appData.transactions.find(item => item.id === id);
            if(!t) return;
            editingId = id;
            document.getElementById('edit-amt').value = t.amt;
            document.getElementById('edit-memo').value = t.memo || "";
            document.getElementById('edit-modal').classList.add('show');
        }
        function saveEdit() {
            const t = appData.transactions.find(item => item.id === editingId);
            if(t) {
                t.amt = Number(document.getElementById('edit-amt').value);
                t.memo = document.getElementById('edit-memo').value;
                saveData();
            }
            document.getElementById('edit-modal').classList.remove('show');
        }
        function deleteEntry() {
            if(confirm("確定要刪除這筆紀錄嗎？")) {
                appData.transactions = appData.transactions.filter(item => item.id !== editingId);
                saveData();
                document.getElementById('edit-modal').classList.remove('show');
            }
        }

        // --- 掃描功能 ---
        const InvoiceParser = {
            parseSummary: (d) => {
                if (d.length < 50 || d.startsWith("**")) return null;
                const amt = parseInt(d.substring(29, 37), 16);
                return isNaN(amt) ? null : { invNum: d.substring(0, 10), amt };
            },
            parseDetails: (d) => {
                if (!d.startsWith("**")) return null;
                const parts = d.substring(2).split(":");
                let items = [];
                for (let i = 0; i < parts.length; i += 3) {
                    if (parts[i]) items.push(`${parts[i]} x${parts[i+1]||1}`);
                }
                return items.join(", ");
            }
        };

        let stream = null;
        async function openScanner() {
            document.getElementById('scan-modal').classList.add('show');
            const video = document.getElementById('preview-video');
            const status = document.getElementById('scan-status');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream; video.play();
                const detector = new BarcodeDetector({ formats: ['qr_code'] });
                const tick = async () => {
                    if (!stream) return;
                    const codes = await detector.detect(video);
                    if (codes.length > 0) {
                        handleScan(codes[0].rawValue);
                    } else { requestAnimationFrame(tick); }
                };
                tick();
            } catch(e) { status.innerText = "相機啟動失敗"; }
        }

        function handleScan(raw) {
            const status = document.getElementById('scan-status');
            const summary = InvoiceParser.parseSummary(raw);
            const details = InvoiceParser.parseDetails(raw);
            if (summary) {
                const newId = Date.now();
                appData.transactions.unshift({ id: newId, type: 'expense', cat: '飲食', amt: summary.amt, memo: "發票:" + summary.invNum, color: colorMap['飲食'] });
                saveData();
                document.getElementById('step-1').classList.remove('active');
                document.getElementById('step-2').classList.add('active');
                status.innerText = `抓到 $${summary.amt}，可續掃右側明細`;
                if (navigator.vibrate) navigator.vibrate(50);
            } else if (details) {
                appData.transactions[0].memo += " | " + details;
                saveData();
                status.innerText = "明細已記錄，圓滿！";
                if (navigator.vibrate) navigator.vibrate([30, 100]);
                setTimeout(closeScanner, 1000);
            }
        }
        function closeScanner() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            stream = null;
            document.getElementById('scan-modal').classList.remove('show');
            document.getElementById('step-1').classList.add('active');
            document.getElementById('step-2').classList.remove('active');
        }
    </script>
</body>
</html>
