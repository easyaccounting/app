<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>發票掃描功能測試</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        #preview { width: 100%; max-width: 400px; border: 2px solid #CBA37A; border-radius: 20px; margin-bottom: 20px; }
        .result-box { background: #222; border: 1px solid #444; padding: 15px; border-radius: 12px; margin-top: 20px; text-align: left; }
        .success { color: #82968C; font-weight: bold; }
        button { background: #CBA37A; border: none; color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        canvas { display: none; }
    </style>
</head>
<body>

    <h2>單機解析測試</h2>
    <p>請對準發票左側或右側 QR Code</p>

    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>

    <div id="status" style="margin: 10px 0; color: #968E86;">等待啟動相機...</div>
    <button onclick="startCamera()">開啟相機</button>

    <div class="result-box">
        <div><strong>偵測結果：</strong></div>
        <div id="parsed-res" class="success">尚未掃描</div>
        <hr>
        <div><strong>原始字串 (Debug)：</strong></div>
        <div id="raw-str" style="font-size: 0.7rem; color: #888; word-break: break-all;">-</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const status = document.getElementById('status');
        const rawStr = document.getElementById('raw-str');
        const parsedRes = document.getElementById('parsed-res');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                status.innerText = "掃描中，請對準發票...";
                requestAnimationFrame(tick);
            } catch (err) {
                status.innerText = "相機啟動失敗：" + err.name;
            }
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                if (code) {
                    handleResult(code.data);
                }
            }
            requestAnimationFrame(tick);
        }

        function handleResult(data) {
            rawStr.innerText = data; // 顯示原始字串

            // 1. 測試左側碼 (長度通常大於 50 且包含金額)
            if (data.length >= 50 && !data.startsWith("**")) {
                const amountHex = data.substring(29, 37);
                const amount = parseInt(amountHex, 16);
                parsedRes.innerHTML = `✅ [左側總計碼] 金額: $${amount}`;
                if (navigator.vibrate) navigator.vibrate(50);
            } 
            // 2. 測試右側碼 (明細)
            else if (data.startsWith("**")) {
                parsedRes.innerHTML = `✅ [右側明細碼] 內容: ${data.substring(0, 30)}...`;
                if (navigator.vibrate) navigator.vibrate([30, 100]);
            }
            else {
                parsedRes.innerText = "掃到非發票格式內容";
            }
        }
    </script>
</body>
</html>
